<script>
// ── Theme toggle (shared brand behaviour) ──────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') !== 'light';
  html.setAttribute('data-theme', isDark ? 'light' : '');
  document.getElementById('theme-icon').textContent  = isDark ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = isDark ? 'DARK' : 'LIGHT';
  try { localStorage.setItem('fpts-theme', isDark ? 'light' : 'dark'); } catch (e) {}
}
(function () {
  try { if (localStorage.getItem('fpts-theme') === 'light') document.documentElement.setAttribute('data-theme', 'light'); } catch (e) {}
})();

// ── Public What's New renderer — public-flagged sessions only, blurbs only ──
(function () {
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
  var mount = document.getElementById('whatsnew-list');
  if (!mount) return;
  var sessions = (window.FormulasContent && window.FormulasContent.sessions) || [];
  var pub = sessions.filter(function (s) { return s && s.public === true; });   // already newest-first
  if (!pub.length) { mount.innerHTML = '<div class="wn-empty">No updates yet — check back soon.</div>'; return; }
  mount.innerHTML = pub.map(function (s) {
    return '<div class="wn-item">'
      + '<div class="wn-date">' + esc(s.dateLabel || '') + '</div>'
      + '<div class="wn-title">' + esc(s.title || '') + '</div>'
      + '<div class="wn-blurb">' + esc(s.blurb || '') + '</div>'
      + '</div>';
  }).join('');
})();
</script>
