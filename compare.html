<!DOCTYPE html>
<!--
═══════════════════════════════════════════════════════════════════════════
  compare.html — Player Comparison page

  Two display modes:
    1. PROFILE (default) — Hayden-Winks-style hero card + 5 similar-player
       matches. Single-player deep-dive with trading-card composition.
    2. TABLE — Underdog-style 2-4 player side-by-side stat table. Row-
       grouped stat categories, green highlight on best-in-row.

  URL hash routing:
    compare.html                                  → empty landing
    compare.html#player=Josh+Allen                → profile mode
    compare.html#mode=table&players=A,B,C,D       → table mode
    &fmt=sf|1qb  &season=2025  &games=4|8|16

  Data sources (existing — no new fetches):
    window.STATS_DATA[lookupKey].seasons[year]    → career stat lines
    window.FP_VALUES[name]                        → FantasyPoints dynasty value SF + 1QB
    window.SLEEPER_IDS[name]                      → photos
    window.ML_PLAYERS (loaded via my-leagues if visited; optional)
    SLEEPER.adjustStatsForLeague(stats, scoring)  → scoring overlay
    SLEEPER.archetypeFromTotals(...)              → archetype label
    SLEEPER.projectPlayer(key, scoring)           → projection

  Future-data hooks (em-dash placeholders + data-pending attrs):
    Prospect score · Routes run · Coverage splits (Man/Zone/Press)
    · Catch% · Contested-catch% · Target rate (precision)
═══════════════════════════════════════════════════════════════════════════
-->

    background: var(--tier-color, var(--muted));
  }
  body.fpts-compare-page .pc-matches-row {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
  }
  body.fpts-compare-page .pc-matches-empty {
    grid-column: 1 / -1; padding: 32px 14px; text-align: center;
    background: var(--surface2); border: 1px dashed var(--border2); border-radius: 6px;
    font-family: 'Mulish', sans-serif; font-size: 12px;
    color: var(--muted); opacity: .6; font-style: italic;
  }
  body.fpts-compare-page .pc-match-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-top: 3px solid var(--tier-color, var(--muted));
    border-radius: 4px;
    padding: 12px; cursor: pointer;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color .12s, background .12s, transform .12s;
    position: relative;
  }
  body.fpts-compare-page .pc-match-card:hover {
    background: var(--surface); border-color: var(--border2);
    transform: translateY(-2px);
  }
  body.fpts-compare-page .pc-match-rank {
    position: absolute; top: 8px; left: 10px;
    font-family: 'Mulish', sans-serif; font-size: 9px; font-weight: 700;
    color: var(--muted); opacity: .7;
    text-transform: uppercase; letter-spacing: .08em;
  }
  body.fpts-compare-page .pc-match-score {
    position: absolute; top: 8px; right: 10px;
    font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic;
    font-size: 18px; color: var(--tier-color, var(--white));
    line-height: 1;
  }
  body.fpts-compare-page .pc-match-tier {
    position: absolute; top: 32px; right: 10px;
    font-family: 'Mulish', sans-serif; font-size: 8px; font-weight: 700;
    color: var(--tier-color, var(--muted));
    text-transform: uppercase; letter-spacing: .1em;
    opacity: .9;
  }
  body.fpts-compare-page .pc-match-photo-wrap {
    margin-top: 22px;
    width: 64px; height: 64px;
    border-radius: 50%; overflow: hidden;
    background: var(--surface); border: 2px solid var(--tier-color, var(--border));
    align-self: center;
  }
  body.fpts-compare-page .pc-match-photo {
    width: 100%; height: 100%; object-fit: cover; object-position: top;
    display: block;
  }
  body.fpts-compare-page .pc-match-photo-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic;
    font-size: 18px; color: var(--muted); opacity: .35;
  }
  body.fpts-compare-page .pc-match-name {
    font-family: 'Mulish', sans-serif; font-weight: 900; font-size: 12px;
    color: var(--white); text-align: center; line-height: 1.2;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  body.fpts-compare-page .pc-match-meta {
    display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; align-items: center;
    font-family: 'Mulish', sans-serif; font-size: 10px;
    color: var(--muted); opacity: .7;
  }
  body.fpts-compare-page .pc-match-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
    margin-top: 4px; padding-top: 8px; border-top: 1px solid var(--border);
  }
  body.fpts-compare-page .pc-match-stat {
    text-align: center;
  }
  body.fpts-compare-page .pc-match-stat-label {
    font-family: 'Mulish', sans-serif; font-size: 7px; font-weight: 700;
    color: var(--muted); opacity: .65;
    text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: 2px;
  }
  body.fpts-compare-page .pc-match-stat-value {
    font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic;
    font-size: 11px; color: var(--white); line-height: 1;
  }

  /* ─── Heatmap panel (lifts Heatmap.render from heatmap.js) ─────────── */
  body.fpts-compare-page .pc-hist-heatmap-wrap {
    background:
      radial-gradient(circle at top right, rgba(255,255,255,0.025) 0%, transparent 60%),
      var(--surface2);
    border: 1px solid var(--border2); border-radius: 6px;
    padding: 18px 20px; min-height: 200px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  /* Strip the heatmap module's own outer margins/padding so it nests
     cleanly inside our card-styled wrapper. The module emits a
     .mvs-section container with default top margin; suppress here. */
  body.fpts-compare-page .pc-hist-heatmap-wrap .mvs-section {
    margin: 0; padding: 0; background: transparent; border: 0;
  }

  /* ─── Recent Trades panel (lifts tradeCardHtml from player-panel) ──── */
  body.fpts-compare-page .pc-hist-trades-wrap {
    background:
      radial-gradient(circle at top right, rgba(255,255,255,0.025) 0%, transparent 60%),
      var(--surface2);

    padding: 18px 20px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);

  body.fpts-compare-page .pc-hist-trades-wrap .trade-card {

    opacity: .65; margin-bottom: 12px;
  }
  body.fpts-compare-page .pc-hist-trades-count strong {
    color: var(--red); font-family: 'Kanit', sans-serif;
    font-weight: 800; font-style: italic; font-size: 14px;
    margin-right: 4px;
  }

  /* ─── Career stats mount (lifts renderPlayerStats from player-panel) ─ */
  body.fpts-compare-page #pc-hist-stats-mount {
    background:
      radial-gradient(circle at top right, rgba(255,255,255,0.025) 0%, transparent 60%),
      var(--surface2);

    padding: 22px 24px 18px 22px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    min-height: 200px;
  }
  body.fpts-compare-page #pc-hist-stats-mount .pp-year-row { transition: background .12s; }
  body.fpts-compare-page #pc-hist-stats-mount .pp-year-row:hover { background: var(--surface); }

    padding: 80px 20px; text-align: center;
    font-family: 'Mulish', sans-serif; font-size: 12px;
    color: var(--muted); opacity: .55; font-style: italic;
  }

  /* ─── ADP History per-year row ─────────────────────────────────────── */
  body.fpts-compare-page .pc-hist-adp-row {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
  }
  body.fpts-compare-page .pc-hist-adp-cell {
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--pos-color, var(--border));
    padding: 12px 10px; text-align: center;
  }
  body.fpts-compare-page .pc-hist-adp-year {
    font-family: 'Mulish', sans-serif; font-size: 10px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 6px; opacity: .7;
  }
  body.fpts-compare-page .pc-hist-adp-rank {
    font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic;
    font-size: 22px; color: var(--white); line-height: 1;
  }

    color: var(--muted); opacity: .35;
  }
  body.fpts-compare-page .pc-hist-adp-posrank {
    font-family: 'Mulish', sans-serif; font-size: 10px;

<!-- ═══════════════════════════════════════════════════════════════════════
     PAGE-SPECIFIC JS — phase 0 is just the theme toggle + data-ready hook.
     Phase 1 fills out the PC state object and the render pipeline.
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    document.getElementById('theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
    document.getElementById('theme-label').textContent = next === 'dark' ? 'LIGHT' : 'DARK';
    try { localStorage.setItem('fpts-theme', next); } catch (e) {}
  }
  (function _initTheme() {
    try {
      const saved = localStorage.getItem('fpts-theme');
      if (saved === 'light') toggleTheme();
    } catch (e) {}
  })();

  // ═══════════════════════════════════════════════════════════════════
  // PC — Player Comparison page state + render pipeline.
  // ═══════════════════════════════════════════════════════════════════
  const PC = {
    mode: 'profile',       // 'profile' | 'table'
    fmt: 'sf',             // 'sf' | '1qb'
    scoring: 'ppr',        // 'ppr' | 'half' | 'td6' | 'tep' — see PC_SCORING
    // Unified player slot list. Used by BOTH modes:
    //   Profile mode: 0 = empty/search state. 1 = single-player layout
    //                 (current). 2-3 = side-by-side compressed cards.
    //   Table mode: 0 = empty. 1-4 = picker slots filled.
    players: [],
    tab: 'profile',        // 'profile' | 'adp' | 'heatmap' | 'value' | 'career' | 'trades'
    games: 4,              // last-N games window for Table mode: 4 | 8 | 16
    searchTimer: null,
    // Legacy alias — readers of PC.player still work via this getter.
    get player()   { return this.players[0] || null; },
    set player(v)  {
      if (v) this.players = [v];
      else   this.players = [];
    },
  };
  const PC_TABS = ['profile', 'adp', 'heatmap', 'value', 'career', 'trades'];
  const PC_GAMES = [4, 8, 16];
  // Scoring presets fed to SLEEPER.adjustStatsForLeague(stats, scoring) so the
  // FPTS row + per-game averages respond to the Scoring toggle in the page
  // header. Field names match Sleeper's scoring_settings convention:
  //   rec          — PPR multiplier (1.0 = full PPR, 0.5 = half, 0 = std)
  //   pass_td      — pass-TD points (4 default; 5/6 common bonus)
  //   bonus_rec_te — TEP bonus per TE reception (typically 0.5)
  // PPR is the default; other dynasty variants are one button-tap away.
  const PC_SCORING = {
    ppr:  { rec: 1,   pass_td: 4 },
    half: { rec: 0.5, pass_td: 4 },
    td6:  { rec: 1,   pass_td: 6 },
    tep:  { rec: 1,   pass_td: 4, bonus_rec_te: 0.5 },
  };
  const PC_SCORING_LABELS = {
    ppr:  'PPR',
    half: 'Half PPR',
    td6:  '6pt TD',
    tep:  'TEP',
  };

  // ─── URL hash routing ──────────────────────────────────────────────
  function _pcParseHash() {
    const h = window.location.hash.slice(1);
    if (!h) { PC.players = []; return; }
    const p = new URLSearchParams(h);
    PC.mode = p.get('mode') === 'table' ? 'table' : 'profile';
    PC.fmt  = p.get('fmt')  === '1qb'   ? '1qb'   : 'sf';
    const sc = p.get('scoring');
    PC.scoring = (sc && PC_SCORING[sc]) ? sc : 'ppr';
    const t = p.get('tab');
    PC.tab  = PC_TABS.indexOf(t) >= 0 ? t : 'profile';
    const g = parseInt(p.get('games'), 10);
    PC.games = PC_GAMES.indexOf(g) >= 0 ? g : 4;
    // Unified player list: accept both legacy `player=` (single) and
    // `players=A,B,C` (multi). Multi wins if both are present.
    const playersParam = p.get('players');
    const playerParam  = p.get('player');
    if (playersParam) {
      PC.players = playersParam.split(',').map(s => decodeURIComponent(s.replace(/\+/g, ' '))).filter(Boolean);
    } else if (playerParam) {
      PC.players = [decodeURIComponent(playerParam.replace(/\+/g, ' '))];
    } else {
      PC.players = [];
    }
    // Enforce per-mode caps so a hand-edited URL like
    // ?players=A,B,C,D&mode=profile doesn't break the 2-column hero
    // layout. Profile cap = 2, Table cap = 4.
    const cap = (PC.mode === 'table') ? 4 : 2;
    if (PC.players.length > cap) {
      PC.players = PC.players.slice(0, cap);
    }
    // Filter to names that exist in FP_VALUES; drops typos / deleted
    // players gracefully so the rest of the URL still loads.
    if (PC.players.length && window.FP_VALUES && Object.keys(window.FP_VALUES).length) {
      PC.players = PC.players.filter(n => !!window.FP_VALUES[n]);
    }
  }

  function _pcWriteHash() {
    const p = new URLSearchParams();
    if (PC.mode !== 'profile') p.set('mode', PC.mode);
    if (PC.fmt  !== 'sf')      p.set('fmt',  PC.fmt);
    if (PC.scoring !== 'ppr')  p.set('scoring', PC.scoring);
    if (PC.tab  !== 'profile') p.set('tab',  PC.tab);
    if (PC.games !== 4)        p.set('games', String(PC.games));
    // Prefer `player=` for clean single-player URLs (back-compat with
    // existing shared links); switch to `players=A,B,C` only when 2+.
    const filled = PC.players.filter(Boolean);
    if (filled.length === 1)      p.set('player',  filled[0]);
    else if (filled.length >= 2)  p.set('players', filled.join(','));
    const s = p.toString();
    const newHash = s ? '#' + s : '';
    if (window.location.hash !== newHash) {
      history.replaceState(null, '', window.location.pathname + newHash);
    }
  }

  // ─── Sleeper /players/nfl loader (idempotent, shared cache) ──────
  function _pcEnsureSleeperDb() {
    if (window.SLEEPER_PLAYERS_DB) return Promise.resolve(window.SLEEPER_PLAYERS_DB);
    if (window.SLEEPER_PLAYERS_DB_LOADING) return window.SLEEPER_PLAYERS_DB_LOADING;
    window.SLEEPER_PLAYERS_DB_LOADING = fetch('https://api.sleeper.app/v1/players/nfl')
      .then(r => r.ok ? r.json() : null)
      .then(db => { if (db) window.SLEEPER_PLAYERS_DB = db; return db; })
      .catch(() => null);
    return window.SLEEPER_PLAYERS_DB_LOADING;
  }

  // ─── Per-year ADP files loader (idempotent, lazy) ─────────────────
  // Each data/adp-{YYYY}.json has byMonth[monthKey][draftType][] arrays.
  // We cache the full set in window.PC_ADP_BY_YEAR once loaded.
  const PC_ADP_YEARS = [2022, 2023, 2024, 2025, 2026];
  function _pcEnsureYearAdp() {
    if (window.PC_ADP_BY_YEAR) return Promise.resolve(window.PC_ADP_BY_YEAR);
    if (window.PC_ADP_BY_YEAR_LOADING) return window.PC_ADP_BY_YEAR_LOADING;
    const v = '?v=' + (window.__DATA_VERSION || Date.now());
    window.PC_ADP_BY_YEAR_LOADING = Promise.all(
      PC_ADP_YEARS.map(y =>
        fetch(`data/adp-${y}.json` + v)
          .then(r => r.ok ? r.json() : null)
          .catch(() => null)
          .then(j => [y, j])
      )
    ).then(pairs => {
      const map = {};
      pairs.forEach(([y, j]) => { if (j) map[y] = j; });
      window.PC_ADP_BY_YEAR = map;
      return map;
    });
    return window.PC_ADP_BY_YEAR_LOADING;
  }

  // For a given player name + year, find their startup ADP rank for the
  // active format. Uses the "ALL" month aggregate when present, otherwise
  // the most recent month. Returns { adp, rank, posRank } or null.
  function _pcGetAdpForYear(name, year) {
    const map = window.PC_ADP_BY_YEAR || {};
    const yearFile = map[year];
    if (!yearFile || !yearFile.byMonth) return null;
    const draftType = (PC.fmt === '1qb') ? 'startup_1qb' : 'startup_sf';
    const norm = (window.normalizePlayerName ? window.normalizePlayerName(name) : name.toLowerCase());
    const monthKeys = Object.keys(yearFile.byMonth).sort();
    if (!monthKeys.length) return null;
    // Prefer "ALL" month if present, otherwise most recent calendar month
    const monthKey = monthKeys.includes('ALL') ? 'ALL' : monthKeys[monthKeys.length - 1];
    const arr = (yearFile.byMonth[monthKey] || {})[draftType] || [];
    const found = arr.find(p => p && p.name && window.normalizePlayerName &&
      window.normalizePlayerName(p.name) === norm);
    if (!found) return null;
    return { adp: found.adp, rank: found.rank, posRank: found.posRank };
  }

  // ─── Helpers ───────────────────────────────────────────────────────
  function _pcPhoto(sid) {
    return sid ? `https://sleepercdn.com/content/nfl/players/thumb/${sid}.jpg` : '';
  }
  function _pcFmtHt(inches) {
    if (!inches) return null;
    const n = Number(inches);
    if (!n) return null;
    const ft = Math.floor(n / 12);
    const inch = n % 12;
    return `${ft}'${inch}"`;
  }
  function _pcBmi(heightIn, weightLb) {
    if (!heightIn || !weightLb) return null;
    const h = Number(heightIn), w = Number(weightLb);
    if (!h || !w) return null;
    return (w * 703) / (h * h);
  }
  function _pcPosColor(pos) {
    return ({ QB:'var(--red)', RB:'var(--green)', WR:'#5b9bd5', TE:'var(--yellow)', K:'var(--muted)' })[pos] || 'var(--muted)';
  }
  function _pcArchetypeLabel(fp) {
    // Phase 1 placeholder — show posRank until the prospect-score classifier
    // ships. data-pending="archetype-classifier" marks the future wire-point.
    return fp.posRank || fp.pos || '—';
  }
  function _pcCurrentSeason() {
    return (window.STATS_DATA && window.STATS_DATA.currentSeason) || 2025;
  }
  function _pcGetStats(name) {
    if (!window.STATS_DATA || !window.STATS_DATA.players) return null;
    const key = 'name:' + (window.normalizePlayerName ? window.normalizePlayerName(name) : name.toLowerCase());
    return window.STATS_DATA.players[key] || null;
  }

  function _pcCardData(name) {
    const fp = (window.FP_VALUES || {})[name];
    if (!fp) return null;
    const sid = fp.sleeperId || (window.SLEEPER_IDS || {})[name];
    const sleeper = sid && window.SLEEPER_PLAYERS_DB ? window.SLEEPER_PLAYERS_DB[sid] : null;
    const stats = _pcGetStats(name);
    return { name, fp, sid, sleeper, stats };
  }

  // ─── Render: empty-state search ────────────────────────────────────
  function _pcRenderEmpty() {
    document.getElementById('pc-app').innerHTML = `
      <div class="pc-empty-search">
        <div class="pc-empty-eyebrow">Player Comparison</div>
        <div class="pc-empty-search-title">Pick a player to start profiling</div>
        <div class="pc-empty-search-sub">Search by name. Profile mode shows a trading-card hero with archetype, physical stats, and current-season production. Table mode (coming in a later phase) compares 2-4 players side-by-side.</div>
        <div class="pc-search-wrap">
          <input class="pc-search-input" id="pc-search" type="text" placeholder="Search by player name..." autocomplete="off" spellcheck="false">
          <div class="pc-search-results" id="pc-search-results"></div>
        </div>
      </div>`;
    const inp = document.getElementById('pc-search');
    if (inp) {
      inp.addEventListener('input', _pcOnSearchInput);
      inp.addEventListener('blur', () => setTimeout(() => {
        const r = document.getElementById('pc-search-results');
        if (r) r.classList.remove('is-open');
      }, 200));
      inp.focus();
    }
  }

  function _pcOnSearchInput(e) {
    clearTimeout(PC.searchTimer);
    const q = (e.target.value || '').trim().toLowerCase();
    PC.searchTimer = setTimeout(() => {
      const resultsEl = document.getElementById('pc-search-results');
      if (!resultsEl) return;
      if (!q) { resultsEl.innerHTML = ''; resultsEl.classList.remove('is-open'); return; }
      const names = Object.keys(window.FP_VALUES || {});
      const matches = names
        .filter(n => n.toLowerCase().includes(q))
        .sort((a, b) => (window.FP_VALUES[a].rank || 9999) - (window.FP_VALUES[b].rank || 9999))
        .slice(0, 12);
      if (!matches.length) {
        resultsEl.innerHTML = '<div class="pc-search-item is-empty">No matches</div>';
        resultsEl.classList.add('is-open');
        return;
      }
      resultsEl.innerHTML = matches.map(n => {
        const fp = window.FP_VALUES[n];
        const safeName = n.replace(/'/g, "\\'");
        return `<div class="pc-search-item" onmousedown="_pcSelectPlayer('${safeName}')">
          <span class="pos-pill ${fp.pos || ''}">${fp.pos || '?'}</span>
          <span class="pc-search-name">${n}</span>
          <span class="pc-search-meta">${fp.team || ''}${fp.posRank ? ' · ' + fp.posRank : ''}</span>
        </div>`;
      }).join('');
      resultsEl.classList.add('is-open');
    }, 60);
  }

  function _pcSelectPlayer(name) {
    PC.player = name;
    _pcWriteHash();
    _pcRender();
  }

  function _pcSwitchPlayer() {
    PC.players = [];
    _pcWriteHash();
    _pcRender();
  }

  // Triggered from the single-player hero's "+ Add comparison player" link.
  // Click the trigger → the link hides and an inline search input appears
  // with the same autocomplete dropdown UX as the empty-state search. Click
  // a result → _pcAddProfilePlayer adds the 2nd player and the layout shifts
  // to the multi-card view. Esc or blur collapses back to the link.
  function _pcOpenAddComparison() {
    const trigger = document.querySelector('.pc-add-comparison-trigger');
    const search  = document.getElementById('pc-add-comparison-search');
    if (!search) return;
    if (trigger) trigger.style.display = 'none';
    search.hidden = false;
    const inp = document.getElementById('pc-add-search');
    if (inp) {
      inp.value = '';
      inp.focus();
      inp.addEventListener('input', _pcOnAddComparisonInput);
      inp.addEventListener('keydown', _pcOnAddComparisonKeydown);
      inp.addEventListener('blur', () => setTimeout(_pcCloseAddComparison, 200));
    }
  }

  function _pcCloseAddComparison() {
    const trigger = document.querySelector('.pc-add-comparison-trigger');
    const search  = document.getElementById('pc-add-comparison-search');
    const results = document.getElementById('pc-add-search-results');
    if (trigger) trigger.style.display = '';
    if (search)  search.hidden = true;
    if (results) { results.classList.remove('is-open'); results.innerHTML = ''; }
  }

  function _pcOnAddComparisonInput(e) {
    clearTimeout(PC.searchTimer);
    const q = (e.target.value || '').trim().toLowerCase();
    PC.searchTimer = setTimeout(() => {
      const resultsEl = document.getElementById('pc-add-search-results');
      if (!resultsEl) return;
      if (!q) { resultsEl.innerHTML = ''; resultsEl.classList.remove('is-open'); return; }
      // Exclude players already in PC.players so user can't pick a duplicate.
      const taken = new Set(PC.players);
      const names = Object.keys(window.FP_VALUES || {});
      const matches = names
        .filter(n => !taken.has(n) && n.toLowerCase().includes(q))
        .sort((a, b) => (window.FP_VALUES[a].rank || 9999) - (window.FP_VALUES[b].rank || 9999))
        .slice(0, 12);
      if (!matches.length) {
        resultsEl.innerHTML = '<div class="pc-search-item is-empty">No matches</div>';
        resultsEl.classList.add('is-open');
        return;
      }
      resultsEl.innerHTML = matches.map(n => {
        const fp = window.FP_VALUES[n];
        const safeName = n.replace(/'/g, "\\'");
        return `<div class="pc-search-item" onmousedown="_pcSelectAddComparison('${safeName}')">
          <span class="pos-pill ${fp.pos || ''}">${fp.pos || '?'}</span>
          <span class="pc-search-name">${n}</span>
          <span class="pc-search-meta">${fp.team || ''}${fp.posRank ? ' · ' + fp.posRank : ''}</span>
        </div>`;
      }).join('');
      resultsEl.classList.add('is-open');
    }, 60);
  }

  function _pcOnAddComparisonKeydown(e) {
    if (e.key === 'Escape') {
      e.preventDefault();
      _pcCloseAddComparison();
    }
  }

  function _pcSelectAddComparison(name) {
    if (!name) return;
    if (!(window.FP_VALUES || {})[name]) return;
    _pcAddProfilePlayer(name);
    // _pcAddProfilePlayer triggers _pcRender which switches the layout to
    // multi-card (2 players); the link + inline search are removed entirely.
    // No explicit cleanup needed here.
  }

  // Add a comparison player to Profile mode (cap at 2, no duplicates).
  // 2-player layout gives each card the horizontal real estate for a
  // full metric table; 3+ gets cramped fast.
  function _pcAddProfilePlayer(name) {
    if (!name) return;
    if (PC.players.indexOf(name) >= 0) return;
    if (PC.players.length >= 2) return;
    PC.players = PC.players.concat([name]);
    _pcWriteHash();
    _pcRender();
  }

  // Remove a player from Profile mode by slot index.
  function _pcRemoveProfilePlayer(idx) {
    if (idx < 0 || idx >= PC.players.length) return;
    PC.players = PC.players.slice();
    PC.players.splice(idx, 1);
    _pcWriteHash();
    _pcRender();
  }

  function _pcSetMode(mode) {
    PC.mode = mode;
    _pcWriteHash();
    _pcRender();
  }

  function _pcSetFmt(fmt) {
    PC.fmt = fmt;
    _pcWriteHash();
    _pcRender();
  }

  function _pcSetScoring(scoring) {
    if (!PC_SCORING[scoring]) return;
    PC.scoring = scoring;
    _pcWriteHash();
    _pcRender();
  }

  // Position lookup for the active player slot. Used by _pcStdFpts so TEP
  // (bonus_rec_te) fires only when the player is a TE.
  function _pcPlayerPos(name) {
    if (!name) return null;
    const fp = (window.FP_VALUES || {})[name];
    return fp ? (fp.pos || fp.position || null) : null;
  }

  function _pcSetTab(tab) {
    if (PC_TABS.indexOf(tab) < 0) return;
    PC.tab = tab;
    _pcWriteHash();
    _pcRender();
  }

  function _pcSetGames(n) {
    n = Number(n);
    if (PC_GAMES.indexOf(n) < 0) return;
    PC.games = n;
    _pcWriteHash();
    _pcRender();
  }

  // ─── Render: profile-mode hero card ────────────────────────────────
  function _pcMiniCell(label, value, pending) {
    const cls = 'pc-card-mini-cell' + (pending ? ' is-pending' : '');
    const v = (value === null || value === undefined || value === '') ? '—' : value;
    return `<div class="${cls}"><div class="pc-mini-value">${v}</div><div class="pc-mini-label">${label}</div></div>`;
  }
  function _pcTile(label, value, pending, pendingKey) {
    const cls = 'pc-tile' + (pending ? ' is-pending' : '');
    const dp = pending ? ` data-pending="${pendingKey || 'true'}"` : '';
    const v = (value === null || value === undefined || value === '') ? '—' : value;
    return `<div class="${cls}"${dp}><div class="pc-tile-label">${label}</div><div class="pc-tile-value">${v}</div></div>`;
  }

  function _pcMiniGridForPosition(pos, stats) {
    const cs = _pcCurrentSeason();
    const s = stats && stats.seasons && stats.seasons[cs];
    const div = (n, d) => (d && d > 0) ? (n / d).toFixed(1) : '—';
    if (!s) {
      // No current-season data — fill with em-dashes for the 6 cells
      const lbls = (pos === 'QB')
        ? ['CMP %','PASS Y/G','PASS TD','RUSH Y/G','VS PRESS','PROSP']
        : (pos === 'RB')
          ? ['ATT/G','RUSH Y/G','REC/G','REC Y/G','ROUTES','PROSP']
          : ['TGT/G','REC/G','REC Y/G','VS MAN','VS ZONE','VS PRESS'];
      return lbls.map((l, i) => _pcMiniCell(l, '—', i >= 4)).join('');
    }
    if (pos === 'QB') {
      const cmpPct = (s.passAtt > 0) ? ((s.passCmp / s.passAtt) * 100).toFixed(1) + '%' : '—';
      return [
        _pcMiniCell('CMP %', cmpPct),
        _pcMiniCell('PASS Y/G', div(s.passYards, s.games)),
        _pcMiniCell('PASS TD', s.passTd != null ? s.passTd : '—'),

  }
