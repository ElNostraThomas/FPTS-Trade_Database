  // ─── Inline-SVG chart with Y-axis column + X-axis row (no library) ─
  // Premium-feeling line chart for the historical sections:
  //   - External Y-axis column (5 labels, no text clipping)
  //   - Gradient fill under the line (rich, not flat)
  //   - Horizontal dashed grid lines at every Y-axis level
  //   - Rounded line caps/joins, 2.5px stroke
  //   - Larger dots with surface-stroke ring for depth, :hover grow
  //   - HTML overlay data-point value labels (sit above each dot)
  //   - X-axis labels in dedicated grid row below the SVG
  //
  // points: [{ value: <number|null>, label: <string> }, ...]
  //   Null values are skipped (line connects valid neighbors).
  // opts:
  //   color                — stroke + fill color (default var(--red))
  //   yInvert              — flip Y axis (use for rank: lower = better → top)
  //   xLabels              — array of one label per point for the X-axis row
  //   gradientId           — unique id for the SVG gradient def
  //   valueFmt             — function(v) → string for Y-axis + data labels
  //   pointLabelFmt        — function(v) → string for the floating data labels
  //                          (default = valueFmt)
  //   yLabelCount          — number of Y-axis labels (default 5)
  //   legend               — string shown in the top legend chip
  //   showPointLabels      — render value labels above each dot (default true)
  function _pcChart(points, opts) {
    opts = opts || {};
    const W = opts.width || 1000;
    const H = opts.height || 240;
    const padX = opts.padX != null ? opts.padX : 18;
    const padY = opts.padY != null ? opts.padY : 24;
    const color = opts.color || 'var(--red)';
    const yInvert = !!opts.yInvert;
    const xLabels = opts.xLabels || [];
    const gradId = opts.gradientId || ('pc-grad-' + Math.random().toString(36).slice(2, 9));
    const valueFmt = typeof opts.valueFmt === 'function' ? opts.valueFmt : (v => Number(v).toLocaleString());
    const pointLabelFmt = typeof opts.pointLabelFmt === 'function' ? opts.pointLabelFmt : valueFmt;
    const yLabelCount = opts.yLabelCount || 5;
    const legend = opts.legend || '';
    const showPointLabels = opts.showPointLabels !== false;

    const valid = points.map((p, i) => ({ value: p && p.value, label: p && p.label, idx: i }))
      .filter(p => p.value != null && !isNaN(p.value));
    if (valid.length < 1) {
      return `<div class="pc-chart-empty">No data to chart</div>`;
    }

    let vmin = Math.min(...valid.map(p => p.value));
    let vmax = Math.max(...valid.map(p => p.value));
    // Pad the Y range a bit so dots don't sit at the very edges
    const rawRange = vmax - vmin;
    if (rawRange === 0) {
      // Single unique value — synthesize a range so the chart isn't a flat line
      // at the very edge. Pad by ±5% of the value (or ±1 for tiny values).
      const pad = Math.max(1, Math.abs(vmax) * 0.05);
      vmax += pad; vmin -= pad;
    } else {
      const pad = rawRange * 0.12;
      vmax += pad; vmin -= pad;
    }
    const vrange = (vmax - vmin) || 1;
    const lastIdx = Math.max(1, points.length - 1);

    const xForIdx = (idx) => padX + (idx / lastIdx) * (W - padX * 2);
    const yForVal = (v) => {
      const t = (v - vmin) / vrange;
      return yInvert ? padY + t * (H - padY * 2) : padY + (1 - t) * (H - padY * 2);
    };

    // Gridlines at every Y-axis level (interior lines only — top + bottom are
    // visually anchored by the chart edge + xaxis border).
    const gridFracs = [];
    for (let i = 1; i < yLabelCount - 1; i++) gridFracs.push(i / (yLabelCount - 1));
    const gridlines = gridFracs.map(t => {
      const y = (padY + t * (H - padY * 2)).toFixed(1);
      return `<line class="pc-chart-gridline" x1="${padX}" y1="${y}" x2="${W - padX}" y2="${y}"/>`;
    }).join('');
    const baseline = `<line class="pc-chart-baseline" x1="${padX}" y1="${(H - padY).toFixed(1)}" x2="${W - padX}" y2="${(H - padY).toFixed(1)}"/>`;

    // SVG body — gradient fill, line, dots
    let svgBody = '';
    if (valid.length === 1) {
      const v = valid[0];
      const x = xForIdx(v.idx).toFixed(1), y = yForVal(v.value).toFixed(1);
      svgBody = `<circle class="pc-chart-dot" cx="${x}" cy="${y}" r="5.5" fill="${color}" stroke="var(--surface2)" stroke-width="2.5"><title>${_escAttr(v.label || '')}</title></circle>`;
    } else {
      const polyPts = valid.map(p => `${xForIdx(p.idx).toFixed(1)},${yForVal(p.value).toFixed(1)}`).join(' ');
      const firstX = xForIdx(valid[0].idx).toFixed(1);
      const lastX = xForIdx(valid[valid.length - 1].idx).toFixed(1);
      const baseY = (H - padY).toFixed(1);
      const fillPoly = `<polygon points="${firstX},${baseY} ${polyPts} ${lastX},${baseY}" fill="url(#${gradId})"/>`;
      const line = `<polyline class="pc-chart-line" points="${polyPts}" stroke="${color}"/>`;
      const dots = valid.map(p => {
        const x = xForIdx(p.idx).toFixed(1);
        const y = yForVal(p.value).toFixed(1);
        return `<circle class="pc-chart-dot" cx="${x}" cy="${y}" r="5.5" fill="${color}" stroke="var(--surface2)" stroke-width="2.5"><title>${_escAttr(p.label || '')}</title></circle>`;
      }).join('');
      svgBody = `${fillPoly}${line}${dots}`;
    }

    // HTML overlay for floating data labels above each dot.
    // SVG <text> distorts under preserveAspectRatio="none", so HTML labels
    // positioned with % coords are the right tool.
    let overlay = '';
    if (showPointLabels) {
      const overlayLabels = valid.map(p => {
        const xPct = (xForIdx(p.idx) / W * 100).toFixed(2);
        const yPct = (yForVal(p.value) / H * 100).toFixed(2);
        return `<span class="pc-chart-data-label" style="left:${xPct}%;top:${yPct}%">${pointLabelFmt(p.value)}</span>`;
      }).join('');
      overlay = `<div class="pc-chart-overlay">${overlayLabels}</div>`;
    }

    // Y-axis labels — N evenly spaced values from top to bottom
    const yLabels = [];
    for (let i = 0; i < yLabelCount; i++) {
      const t = i / (yLabelCount - 1);
      // For yInvert: top = vmin, bot = vmax. Otherwise: top = vmax, bot = vmin.
      const v = yInvert ? (vmin + t * vrange) : (vmax - t * vrange);
      yLabels.push(v);
    }
    const yAxisHtml = `
      <div class="pc-chart-yaxis">
        ${yLabels.map(v => `<span class="pc-chart-yaxis-label">${valueFmt(v)}</span>`).join('')}
      </div>`;

    // X-axis labels (external grid row, evenly spaced) — only when provided
    let xAxisHtml = '';
    if (xLabels.length) {
      const cols = `repeat(${xLabels.length}, 1fr)`;
      const cells = xLabels.map(l => `<span class="pc-chart-xaxis-label">${l}</span>`).join('');
      xAxisHtml = `<div class="pc-chart-xaxis" style="grid-template-columns:${cols}">${cells}</div>`;
    }

    const legendHtml = legend ? `
      <div class="pc-chart-legend" style="--legend-color:${color}">
        <span class="pc-chart-legend-dot"></span>
        <span>${legend}</span>
      </div>` : '';

    return `
      ${legendHtml}
      <div class="pc-chart-body">
        ${yAxisHtml}
        <div class="pc-chart-svg-col">
          <div class="pc-chart-svg-wrap">
            <svg class="pc-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" role="img">
              <defs>
                <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="${color}" stop-opacity="0.32"/>
                  <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
                </linearGradient>
              </defs>
              ${gridlines}
              ${baseline}
              ${svgBody}
            </svg>
            ${overlay}
          </div>
          ${xAxisHtml}
        </div>
      </div>`;
  }

  // Summary stat boxes below the chart: PEAK / LOW / AVG / CURRENT
  // For yInvert (rank), PEAK = lowest number (best). Otherwise PEAK = highest.
  function _pcChartStats(points, opts) {
    opts = opts || {};
    const valid = points.filter(p => p && p.value != null && !isNaN(p.value));
    if (!valid.length) return '';
    const yInvert = !!opts.yInvert;
    const fmt = typeof opts.valueFmt === 'function' ? opts.valueFmt : (v => Number(v).toLocaleString());

    const vmin = Math.min(...valid.map(p => p.value));
    const vmax = Math.max(...valid.map(p => p.value));
    const avg = valid.reduce((s, p) => s + p.value, 0) / valid.length;
    const cur = valid[valid.length - 1].value;

    const peakLabel = yInvert ? 'PEAK RANK' : 'HIGH';
    const lowLabel  = yInvert ? 'LOWEST RANK' : 'LOW';
    const peakVal   = yInvert ? vmin : vmax;
    const lowVal    = yInvert ? vmax : vmin;

    const tile = (label, value, color, metaLabel) => `
      <div class="pc-chart-stat" style="--stat-color:${color}">
        <div class="pc-chart-stat-label">${label}</div>
        <div class="pc-chart-stat-value">${fmt(value)}</div>
        ${metaLabel ? `<div class="pc-chart-stat-meta">${metaLabel}</div>` : ''}
      </div>`;

    return `
      <div class="pc-chart-stats">
        ${tile(peakLabel, peakVal, 'var(--green)', '')}
        ${tile(lowLabel,  lowVal,  'var(--red)',   '')}
        ${tile('AVG',     avg,     'var(--muted)', '')}
        ${tile('CURRENT', cur,     'var(--yellow)', '')}
      </div>`;
  }

  // Tiny helper — escape value for SVG <title> / attr context
  function _escAttr(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ─── Render: in-page Historical section (below hero) ──────────────
  // Phase 2a ships: Background tiles + ADP History numeric row.
  // Phase 2b adds: charts (ADP trend, FP Dynasty value history).
  // Phase 2c adds: Career Stats by Season (lifts renderPlayerStats).
  // Phase 2d adds: Recent Trades (lifts tradeCardHtml).

  function _pcBackgroundTiles(data) {
    const sp = data.sleeper || {};
    const md = sp.metadata || {};
    const fp = data.fp || {};

    // Class of YYYY (rookie year)
    const rookieYr = md.rookie_year || null;
    const classLabel = rookieYr ? `'${String(rookieYr).slice(-2)}` : '—';

    // Born + derived age (FP age is already shown in hero; Born adds context)
    let bornVal = '—';
    if (sp.birth_date) {
      const d = new Date(sp.birth_date);
      if (!isNaN(d.getTime())) {
        const mo = d.toLocaleString('en-US', { month: 'short' });
        bornVal = `${mo} ${d.getDate()}, ${d.getFullYear()}`;
      }
    }

    // Hometown (city, state) — many players have nulls here
    let hometown = '—';
    if (sp.birth_city && sp.birth_state) {
      hometown = `${sp.birth_city}, ${sp.birth_state}`;
    } else if (sp.birth_city) {
      hometown = sp.birth_city;
    } else if (sp.birth_state) {
      hometown = sp.birth_state;
    }

    const college  = sp.college || '—';
    const hsName   = sp.high_school || '—';
    const jersey   = (sp.number != null) ? `#${sp.number}` : '—';
    const status   = sp.status || (fp.injury ? 'Injured' : '—');

    return [
      _pcTile('Class', classLabel),
      _pcTile('College', college),
      _pcTile('Born', bornVal),
      _pcTile('Hometown', hometown),
      _pcTile('High School', hsName),
      _pcTile('Jersey', jersey),
      _pcTile('Status', status),
      _pcTile('Draft Pick', '—', true, 'nfl-draft-round-pick'),
    ].join('');
  }

  function _pcAdpHistoryRow(name, fp) {
    const posColor = _pcPosColor(fp && fp.pos);
    const cells = PC_ADP_YEARS.map(yr => {
      const rec = _pcGetAdpForYear(name, yr);
      if (!rec || rec.rank == null) {
        return `<div class="pc-hist-adp-cell is-empty">
          <div class="pc-hist-adp-year">${yr}</div>
          <div class="pc-hist-adp-rank">—</div>
        </div>`;
      }
      return `<div class="pc-hist-adp-cell" style="--pos-color:${posColor}">
        <div class="pc-hist-adp-year">${yr}</div>
        <div class="pc-hist-adp-rank">#${rec.rank}</div>
        ${rec.posRank ? `<div class="pc-hist-adp-posrank">${rec.posRank}</div>` : ''}
      </div>`;
    }).join('');
    return `<div class="pc-hist-adp-row">${cells}</div>`;
  }

  function _pcAdpHistoryChart(name) {
    const points = PC_ADP_YEARS.map(yr => {
      const rec = _pcGetAdpForYear(name, yr);
      if (!rec || rec.rank == null) return { value: null, label: `${yr}: —` };
      const posRankPart = rec.posRank ? ` (${rec.posRank})` : '';
      return { value: rec.rank, label: `${yr}: #${rec.rank}${posRankPart}` };
    });
    const validCount = points.filter(p => p.value != null).length;
    if (validCount < 2) return ''; // Skip chart when only 0-1 data points
    // yInvert: ADP rank is "lower is better" — render #1 at the top.
    const yLabelFmt = v => '#' + Math.round(v);
    const dotLabelFmt = v => '#' + Math.round(v);
    return `<div class="pc-chart">
      ${_pcChart(points, {
        color: 'var(--green)',
        yInvert: true,
        xLabels: PC_ADP_YEARS.map(String),
        gradientId: 'pc-grad-adp',
        valueFmt: yLabelFmt,
        pointLabelFmt: dotLabelFmt,
        legend: 'Overall startup rank',
      })}
      ${_pcChartStats(points, {
        yInvert: true,
        valueFmt: yLabelFmt,
      })}
    </div>`;
  }

  // Pulls FantasyPoints dynasty value history for the active format.
  // Internally backed by MVS_PAYLOAD.players[name].history / .history1qb.
  function _pcFpValueHistory(name) {
    const mvs = (window.MVS_PAYLOAD && window.MVS_PAYLOAD.players)
      ? window.MVS_PAYLOAD.players[name]
      : null;
    if (!mvs) return null;
    const series = (PC.fmt === '1qb') ? (mvs.history1qb || []) : (mvs.history || []);
    if (!series.length) return null;
    return series;
  }

  function _pcFpValueSection(name, fp) {
    const series = _pcFpValueHistory(name);
    const fmtLabel = (PC.fmt === '1qb') ? '1QB' : 'SF';
    if (!series || series.length < 1) {
      return `<div class="pc-chart-empty">No ${fmtLabel} value history available for this player.</div>`;
    }
    const points = series.map(p => ({
      value: p.mvs,
      label: `${p.date}: ${p.mvs != null ? p.mvs.toLocaleString() : '—'}`,
    }));
    // Build pretty MMM-DD labels for the X axis so users can read the
    // time range without scanning ISO strings.
    const xLabels = series.map(p => {
      if (!p.date) return '';
      const d = new Date(p.date);
      if (isNaN(d.getTime())) return p.date;
      return d.toLocaleString('en-US', { month: 'short', day: 'numeric' });
    });
    const yLabelFmt = v => Math.round(v).toLocaleString();
    const ptLabelFmt = v => Math.round(v).toLocaleString();
    return `<div class="pc-chart">
      ${_pcChart(points, {
        color: 'var(--red)',
        gradientId: 'pc-grad-fp',
        xLabels: xLabels,
        valueFmt: yLabelFmt,
        pointLabelFmt: ptLabelFmt,
        legend: `Fantasy Points ${fmtLabel} value`,
      })}
      ${_pcChartStats(points, {
        valueFmt: yLabelFmt,
      })}
    </div>`;
  }

  // Wires the existing renderPlayerStats(containerId, player) function from
  // player-panel.js into our #pc-hist-stats-mount container. The drawer's
  // renderer guards its result against `global._currentPanelPlayer.label !==
  // targetName` (to prevent slow Sleeper responses for player A from
  // overwriting player B once the user has swapped). We mirror that state
  // here so the guard passes when called from compare.html — re-set on every
  // _pcRender() so compare.html stays authoritative for the player it owns.
  function _pcRenderCareerStats(name, pos) {
    const mountId = 'pc-hist-stats-mount';
    if (!document.getElementById(mountId)) return;
    if (typeof window.renderPlayerStats !== 'function') return;
    // Map FP_VALUES pos to renderer's expected posKey set.
    const posKey = ({ QB: 'QB', RB: 'RB', WR: 'WR', TE: 'TE' })[pos] || 'WR';
    window._currentPanelPlayer = { label: name, posKey: posKey };
    try {
      window.renderPlayerStats(mountId, { posKey: posKey, label: name });
    } catch (e) {
      const el = document.getElementById(mountId);
      if (el) el.innerHTML = '<div class="pc-hist-stats-loading">Error loading season stats.</div>';
    }
  }

  // ─── Top Profile Matches (Phase 3) ─────────────────────────────────
  // Similarity scoring uses what we have today: position (hard gate),
  // age, current PPG, FP dynasty value. When prospect-score / route /
  // coverage data ships, add weighted features here without changing
  // the consumer API. Score is 0-100; banded into ELITE/STRONG/MOD/LOOSE
  // for the tier badge color.

  // Position is a hard gate — only same-position players score > 0.
  function _pcSimilarity(target, other) {
    if (!target || !other) return 0;
    if (target.pos !== other.pos) return 0;
    if (!target.pos) return 0;

    const tAge = (target.age != null) ? Number(target.age) : null;
    const oAge = (other.age != null) ? Number(other.age) : null;
    const tPpg = (target.ppg != null) ? Number(target.ppg) : null;
    const oPpg = (other.ppg != null) ? Number(other.ppg) : null;
    const tVal = Number(target.valueSf != null ? target.valueSf : target.value || 0);
    const oVal = Number(other.valueSf  != null ? other.valueSf  : other.value  || 0);

    // 0..1 closeness scores. Tuned so realistic deltas fall in 0.4..1 range.
    const age = (tAge != null && oAge != null)
      ? Math.max(0, 1 - Math.abs(tAge - oAge) / 8) : 0.5;
    const ppg = (tPpg != null && oPpg != null)
      ? Math.max(0, 1 - Math.abs(tPpg - oPpg) / 14) : 0.5;
    const val = (tVal > 0 && oVal > 0)
      ? Math.max(0, 1 - Math.abs(tVal - oVal) / 4500) : 0.5;

    // Weighted composite. Value carries the most weight (it's the
    // single best summary of dynasty consensus on the player).
    const composite = age * 0.25 + ppg * 0.30 + val * 0.45;
    return Math.round(composite * 100);
  }

  // Returns { label, color } for the tier band.
  function _pcMatchTier(score) {
    if (score >= 90) return { label: 'Elite',    color: 'var(--yellow)' };
    if (score >= 75) return { label: 'Strong',   color: 'var(--green)'  };
    if (score >= 60) return { label: 'Moderate', color: '#5b9bd5'       };
    return { label: 'Loose', color: 'var(--muted)' };
  }

  // Find top-N matches for a player by similarity score, excluding self.
  function _pcTopMatches(name, count) {
    const FP = window.FP_VALUES || {};
    const target = FP[name];
    if (!target || !target.pos) return [];

    const scored = [];
    Object.keys(FP).forEach(otherName => {
      if (otherName === name) return;
      const other = FP[otherName];
      if (!other || other.pos !== target.pos) return;
      // Skip players with no real value (MVS didn't cover them)
      const oVal = Number(other.valueSf != null ? other.valueSf : other.value || 0);
      if (oVal === 0) return;
      const score = _pcSimilarity(target, other);
      if (score <= 0) return;
      scored.push({ name: otherName, fp: other, score });
    });

    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, count || 5);
  }

  function _pcMatchCard(match, rank) {
    const sid = match.fp.sleeperId || (window.SLEEPER_IDS || {})[match.name];
    const photo = sid ? `https://sleepercdn.com/content/nfl/players/thumb/${sid}.jpg` : '';
    const tier = _pcMatchTier(match.score);
    const safeName = match.name.replace(/'/g, "\\'");
    const age = (match.fp.age != null) ? Number(match.fp.age).toFixed(1) : '—';
    const ppg = (match.fp.ppg != null) ? Number(match.fp.ppg).toFixed(1) : '—';
    const valRaw = (PC.fmt === '1qb') ? match.fp.value1qb : (match.fp.valueSf != null ? match.fp.valueSf : match.fp.value);
    const valFmt = (valRaw != null) ? Number(valRaw).toLocaleString() : '—';
    return `
      <div class="pc-match-card" style="--tier-color:${tier.color}" onclick="_pcSelectPlayer('${safeName}')">
        <div class="pc-match-rank">#${rank}</div>
        <div class="pc-match-score">${match.score}</div>
        <div class="pc-match-tier">${tier.label}</div>
        <div class="pc-match-photo-wrap">
          ${photo
            ? `<img class="pc-match-photo" src="${photo}" alt="${_escAttr(match.name)}" onerror="this.style.display='none'; if(this.nextElementSibling)this.nextElementSibling.style.display='flex';">`
            : ''}
          <div class="pc-match-photo-fallback" ${photo ? 'style="display:none;width:100%;height:100%;"' : 'style="width:100%;height:100%;"'}>${match.fp.pos || '?'}</div>
        </div>
        <div class="pc-match-name">${_escAttr(match.name)}</div>
        <div class="pc-match-meta">
          <span class="pos-pill ${match.fp.pos || ''}">${match.fp.pos || '?'}</span>
          <span>${match.fp.team || ''}</span>
          ${match.fp.posRank ? `<span>· ${match.fp.posRank}</span>` : ''}
        </div>
        <div class="pc-match-stats">
          <div class="pc-match-stat">
            <div class="pc-match-stat-label">Age</div>
            <div class="pc-match-stat-value">${age}</div>
          </div>
          <div class="pc-match-stat">
            <div class="pc-match-stat-label">PPG</div>
            <div class="pc-match-stat-value">${ppg}</div>
          </div>
          <div class="pc-match-stat">
            <div class="pc-match-stat-label">${PC.fmt === '1qb' ? '1QB' : 'SF'}</div>
            <div class="pc-match-stat-value">${valFmt}</div>
          </div>
        </div>
      </div>`;
  }

  function _pcRenderMatches(name) {
    const matches = _pcTopMatches(name, 5);
    const legend = [
      { label: 'Elite',    color: 'var(--yellow)' },
      { label: 'Strong',   color: 'var(--green)'  },
      { label: 'Moderate', color: '#5b9bd5'       },
      { label: 'Loose',    color: 'var(--muted)'  },
    ].map(t => `
      <span class="pc-matches-legend-item" style="--tier-color:${t.color}">
        <span class="pc-matches-legend-dot"></span>${t.label}
      </span>`).join('');

    let body = '';
    if (!matches.length) {
      body = `<div class="pc-matches-empty">No similar players found in the same position with comparable value coverage.</div>`;
    } else {
      body = matches.map((m, i) => _pcMatchCard(m, i + 1)).join('');
    }

    return `
      <div class="pc-matches-section">
        <div class="pc-matches-header">
          <div>
            <div class="pc-matches-heading">Top Profile Matches</div>
            <span class="pc-matches-heading-sub">Ranked by position · age · PPG · ${PC.fmt === '1qb' ? '1QB' : 'SF'} dynasty value</span>
          </div>
          <div class="pc-matches-legend">${legend}</div>
        </div>
        <div class="pc-matches-row">${body}</div>
      </div>`;
  }

  // ─── Per-tab panel renderers ───────────────────────────────────────
  // Each takes (name, data) and returns HTML for one tab's content area.

  function _pcPanelProfile(name, data) {
    const sleeperReady = !!data.sleeper;
    return `
      <div class="pc-panel-eyebrow">Player profile</div>
      <div class="pc-panel-title">Background & identity</div>
      <div class="pc-panel-sub">Class, college, hometown, draft slot, jersey & status. The drafted-round/pick tile awaits a separate NFL-draft data source.</div>
      ${sleeperReady
        ? `<div class="pc-tiles" style="margin-top:8px">${_pcBackgroundTiles(data)}</div>`
        : `<div class="pc-hist-empty">Loading background data…</div>`}
      ${_pcRenderMatches(name)}`;
  }

  function _pcPanelAdp(name, data) {
    const adpReady = !!window.PC_ADP_BY_YEAR;
    const fmtLabel = (PC.fmt === '1qb') ? '1QB' : 'SF';
    return `
      <div class="pc-panel-eyebrow">Dynasty startup ADP — ${fmtLabel}</div>
      <div class="pc-panel-title">Per-year overall rank</div>
      <div class="pc-panel-sub">Annual overall startup-ADP rank from FantasyPoints dynasty drafts. Chart highlights the player's trajectory; year cells below show the precise rank + positional rank.</div>
      ${adpReady
        ? `${_pcAdpHistoryChart(name)}${_pcAdpHistoryRow(name, data.fp)}`
        : `<div class="pc-hist-empty">Loading per-year ADP files…</div>`}`;
  }

  function _pcPanelValue(name, data) {
    const fmtLabel = (PC.fmt === '1qb') ? '1QB' : 'SF';
    return `
      <div class="pc-panel-eyebrow">FantasyPoints dynasty value — ${fmtLabel}</div>
      <div class="pc-panel-title">Trade-value trend</div>
      <div class="pc-panel-sub">Recent dynasty trade-value movement — daily snapshots from FantasyPoints' dynasty data. PEAK / LOW / AVG / CURRENT summary below the chart.</div>
      ${_pcFpValueSection(name, data.fp)}`;
  }

  // Pick-availability heatmap — lifts window.Heatmap.render from heatmap.js.
  // Renders into #pc-hist-heatmap-mount after the panel HTML is in the DOM.
  // Empty-state is handled by the module itself (renders a placeholder
  // "isn't tracked for this player" card when the sleeperId isn't in the
  // top-300 coverage window).
  function _pcPanelHeatmap(name, data) {
    return `
      <div class="pc-panel-eyebrow">Pick-availability heatmap</div>
      <div class="pc-panel-title">Where ${_escAttr(name)} goes in dynasty drafts</div>
      <div class="pc-panel-sub">Per-pick probability of still being on the board at each round × slot. Cells colored by frequency from real FantasyPoints dynasty drafts; deeper red = more often available there.</div>
      <div id="pc-hist-heatmap-mount" class="pc-hist-heatmap-wrap"></div>`;
  }

  function _pcPanelCareer(name, data) {
    return `
      <div class="pc-panel-eyebrow">Career stats by season</div>
      <div class="pc-panel-title">Production history</div>
      <div class="pc-panel-sub">Data Suite full-PPR scoring · 2021–2025. Click any year to expand week-by-week splits for that season.</div>
      <div id="pc-hist-stats-mount">
        <div class="pc-hist-stats-loading">Loading season stats…</div>
      </div>`;
  }

  // Reuses _buildTradesFromMvs() + tradeCardHtml() from player-panel.js. The
  // shared builder dedupes every trade across all players' recentTrades feeds
  // (each trade typically appears in N players' lists). We filter the result
  // to trades where the profiled player appears on either side.
  function _pcPanelTrades(name, data) {
    let trades = [];
    if (typeof window._buildTradesFromMvs === 'function') {
      try {
        const all = window._buildTradesFromMvs();
        trades = (all || []).filter(t => (t.players || []).some(p => p && p.name === name));
      } catch (e) { trades = []; }
    }
    let body = '';
    if (!trades.length) {
      body = `<div class="pc-hist-empty" style="padding:48px 14px">No recent trades involving ${_escAttr(name)} in the FantasyPoints transaction feed.</div>`;
    } else if (typeof window.tradeCardHtml !== 'function') {
      body = `<div class="pc-hist-empty" style="padding:48px 14px">tradeCardHtml renderer not loaded.</div>`;
    } else {
      const cards = trades.map(t => {
        try { return window.tradeCardHtml(t); }
        catch (e) { return ''; }
      }).join('');
      body = `
        <div class="pc-hist-trades-wrap">
          <div class="pc-hist-trades-count"><strong>${trades.length}</strong>${trades.length === 1 ? ' trade' : ' trades'} found</div>
          ${cards}
        </div>`;
    }
    return `
      <div class="pc-panel-eyebrow">Recent trades</div>
      <div class="pc-panel-title">Trade activity</div>
      <div class="pc-panel-sub">Actual dynasty-league trades involving ${_escAttr(name)} from FantasyPoints' transaction feed. Click any asset to drill into that player's drawer.</div>
      ${body}`;
  }

  // ─── Tab bar + active panel ────────────────────────────────────────
  function _pcRenderHistorical(name) {
    const data = _pcCardData(name);
    if (!data) return '';

    const tabs = [
      { key: 'profile', label: 'Profile' },
      { key: 'adp',     label: 'ADP' },
      { key: 'heatmap', label: 'Heatmap' },
      { key: 'value',   label: 'Value' },
      { key: 'career',  label: 'Career' },
      { key: 'trades',  label: 'Trades' },
    ];
    const tabBar = tabs.map(t => `
      <button class="pc-tab-btn${PC.tab === t.key ? ' is-active' : ''}"
              data-tab="${t.key}"
              onclick="_pcSetTab('${t.key}')">${t.label}</button>
    `).join('');

    let panel = '';
    switch (PC.tab) {
      case 'adp':     panel = _pcPanelAdp(name, data);     break;
      case 'heatmap': panel = _pcPanelHeatmap(name, data); break;
      case 'value':   panel = _pcPanelValue(name, data);   break;
      case 'career':  panel = _pcPanelCareer(name, data);  break;
      case 'trades':  panel = _pcPanelTrades(name, data);  break;
      case 'profile':
      default:        panel = _pcPanelProfile(name, data); break;
    }

    return `
      <div class="pc-historical" id="pc-historical">
        <div class="pc-tabs-bar">${tabBar}</div>
        <div class="pc-tab-panel">${panel}</div>
      </div>`;
  }

  // ─── Table mode (Phase 4) ───────────────────────────────────────────
  // Up to 4 player slots side-by-side. Each empty slot exposes a search
  // input; filled slots show a compact player card with × clear.
  // Below the picker: stat-category row groups. Phase 4 ships just the
  // Identity row group; phase 5 adds more groups + per-row best-in-row
  // highlighting.

  function _pcTableAddPlayer(slotIdx, name) {
    if (!name) return;
    PC.players = PC.players.slice();
    while (PC.players.length < 4) PC.players.push(null);
    PC.players[slotIdx] = name;
    // Trim trailing nulls so the hash stays tidy
    while (PC.players.length && !PC.players[PC.players.length - 1]) {
      PC.players.pop();
    }
    _pcWriteHash();
    _pcRender();
  }

  function _pcTableRemovePlayer(slotIdx) {
    if (slotIdx >= PC.players.length) return;
    PC.players = PC.players.slice();
    PC.players[slotIdx] = null;
    while (PC.players.length && !PC.players[PC.players.length - 1]) {
      PC.players.pop();
    }
    _pcWriteHash();
    _pcRender();
  }

  function _pcTableSlotSearchInput(slotIdx, e) {
    clearTimeout(PC.searchTimer);
    const q = (e.target.value || '').trim().toLowerCase();
    PC.searchTimer = setTimeout(() => {
      const resultsEl = document.getElementById('pc-table-slot-results-' + slotIdx);
      if (!resultsEl) return;
      if (!q) { resultsEl.innerHTML = ''; resultsEl.classList.remove('is-open'); return; }
      const taken = new Set((PC.players || []).filter(Boolean));
      const matches = Object.keys(window.FP_VALUES || {})
        .filter(n => !taken.has(n) && n.toLowerCase().includes(q))
        .sort((a, b) => (window.FP_VALUES[a].rank || 9999) - (window.FP_VALUES[b].rank || 9999))
        .slice(0, 12);
      if (!matches.length) {
        resultsEl.innerHTML = '<div class="pc-search-item is-empty">No matches</div>';
        resultsEl.classList.add('is-open');
        return;
      }
      resultsEl.innerHTML = matches.map(n => {
        const fp = window.FP_VALUES[n];
        const safeName = n.replace(/'/g, "\\'");
        return `<div class="pc-search-item" onmousedown="_pcTableAddPlayer(${slotIdx}, '${safeName}')">
          <span class="pos-pill ${fp.pos || ''}">${fp.pos || '?'}</span>
          <span class="pc-search-name">${n}</span>
          <span class="pc-search-meta">${fp.team || ''}${fp.posRank ? ' · ' + fp.posRank : ''}</span>
        </div>`;
      }).join('');
      resultsEl.classList.add('is-open');
    }, 60);
  }

  function _pcTableSlot(idx) {
    const name = PC.players[idx];
    if (!name) {
      return `
        <div class="pc-table-slot is-empty">
          <div class="pc-table-slot-idx">Slot ${idx + 1}</div>
          <div class="pc-table-slot-empty-label">+ Add player</div>
          <div class="pc-table-slot-empty-sub">Search by name</div>
          <input class="pc-table-slot-search" type="text" placeholder="Search…"
                 autocomplete="off" spellcheck="false"
                 oninput="_pcTableSlotSearchInput(${idx}, event)">
          <div class="pc-table-slot-results" id="pc-table-slot-results-${idx}"></div>
        </div>`;
    }
    const fp = (window.FP_VALUES || {})[name] || {};
    const sid = fp.sleeperId || (window.SLEEPER_IDS || {})[name];
    const photo = sid ? `https://sleepercdn.com/content/nfl/players/thumb/${sid}.jpg` : '';
    const posColor = _pcPosColor(fp.pos);
    const safeName = name.replace(/'/g, "\\'");
    return `
      <div class="pc-table-slot" style="--pos-color:${posColor}">
        <div class="pc-table-slot-idx">Slot ${idx + 1}</div>
        <button class="pc-table-slot-clear" onclick="_pcTableRemovePlayer(${idx})" title="Remove">✕</button>
        <div class="pc-table-slot-photo-wrap">
          ${photo ? `<img class="pc-table-slot-photo" src="${photo}" alt="${_escAttr(name)}" onerror="this.style.display='none'">` : ''}
        </div>
        <div class="pc-table-slot-name">${_escAttr(name)}</div>
        <div class="pc-table-slot-meta">
          <span class="pos-pill ${fp.pos || ''}">${fp.pos || '?'}</span>
          <span>${fp.team || ''}</span>
          ${fp.posRank ? `<span>· ${fp.posRank}</span>` : ''}
        </div>
      </div>`;
  }

  // Row helpers — each takes the filled players, returns row HTML.
  // best: optional function(values) → idx of best value (used for highlighting).
  // fmt:  function(fpRecord) → display string for that player.
  function _pcTableRow(label, players, fmt, opts) {
    opts = opts || {};
    const values = players.map(p => p ? fmt(p) : null);
    const cells = values.map((v, i) => {
      if (!players[i]) return `<div class="pc-table-row-cell is-empty">—</div>`;
      const isBest = opts.bestIdx === i;
      return `<div class="pc-table-row-cell${isBest ? ' is-best' : ''}">${v == null || v === '' ? '—' : v}</div>`;
    }).join('');
    return `
      <div class="pc-table-row">
        <div class="pc-table-row-label">${label}</div>
        ${cells}
      </div>`;
  }

  // Identity row group — pos, team, age, years exp, pos rank, FP value, PPG.
  // "Best" is defined per row (high or low depending on metric).
  function _pcTableIdentityGroup() {
    const fps = PC.players.map(name => name ? (window.FP_VALUES || {})[name] : null);
    // Pad to 4 slots
    while (fps.length < 4) fps.push(null);

    // Find best index per numeric row. min/max depending on metric.
    const bestIdx = (vals, mode) => {
      const numeric = vals.map((v, i) => ({ v: (v == null || isNaN(v)) ? null : Number(v), i })).filter(x => x.v != null);
      if (numeric.length < 2) return -1;
      const target = mode === 'min'
        ? numeric.reduce((a, b) => a.v < b.v ? a : b)
        : numeric.reduce((a, b) => a.v > b.v ? a : b);
      return target.i;
    };

    const posVals  = fps.map(fp => fp ? fp.pos : null);
    const teamVals = fps.map(fp => fp ? fp.team : null);
    const ageVals  = fps.map(fp => fp ? (fp.age != null ? Number(fp.age) : null) : null);
    const yrsVals  = fps.map(fp => fp ? null : null); // years_exp lives on SLEEPER_PLAYERS_DB, not FP_VALUES; defer
    const prankVals = fps.map(fp => fp ? (fp.posRank || null) : null);
    const ppgVals  = fps.map(fp => fp ? (fp.ppg != null ? Number(fp.ppg) : null) : null);
    const valVals  = fps.map(fp => fp ? Number((PC.fmt === '1qb' ? fp.value1qb : (fp.valueSf != null ? fp.valueSf : fp.value)) || 0) : null);
    // posRank parse — extract numeric tail (e.g. "WR1" → 1) for "lower is better"
    const prankNumeric = prankVals.map(v => {
      if (!v) return null;
      const m = String(v).match(/(\d+)$/);
      return m ? Number(m[1]) : null;
    });

    const fmt1 = v => v == null ? '—' : Number(v).toFixed(1);
    const fmtInt = v => v == null ? '—' : Math.round(v).toLocaleString();
    const fmtRaw = v => v == null || v === '' ? '—' : String(v);

    const rows = [
      // Pos + Team (categorical — no best)
      _pcTableRow('Position',  PC.players, (n, i) => fps[i]?.pos ? `<span class="pos-pill ${fps[i].pos}">${fps[i].pos}</span>` : '—'),
      _pcTableRow('Team',      PC.players, (n, i) => fmtRaw(teamVals[i])),
      _pcTableRow('Pos rank',  PC.players, (n, i) => fmtRaw(prankVals[i]), { bestIdx: bestIdx(prankNumeric, 'min') }),
      _pcTableRow('Age',       PC.players, (n, i) => fmt1(ageVals[i]),      { bestIdx: bestIdx(ageVals, 'min') }),
      _pcTableRow('PPG',       PC.players, (n, i) => fmt1(ppgVals[i]),      { bestIdx: bestIdx(ppgVals, 'max') }),
      _pcTableRow('FP ' + (PC.fmt === '1qb' ? '1QB' : 'SF') + ' value', PC.players, (n, i) => fmtInt(valVals[i]), { bestIdx: bestIdx(valVals, 'max') }),
    ].join('');

    return `
      <div class="pc-table-rowgroup">
        <div class="pc-table-rowgroup-title">Identity</div>
        ${rows}
      </div>`;
  }

  // ─── Stat helpers for the row groups ──────────────────────────────
  // Full PPR + 4-pt pass TD baseline. Mirrors the data-suite's neutral
  // Scoring overlay used by the Season + Last-N stat row groups. Delegates
  // to SLEEPER.adjustStatsForLeague so the FPTS row + per-game averages
  // respond to the Scoring toggle in the page header. `pos` is injected
  // into the stats record so TEP (bonus_rec_te) fires only for TEs.
  // Falls back to inline full-PPR / 4pt-TD if SLEEPER isn't loaded yet.
  function _pcStdFpts(s, pos) {
    if (!s) return 0;
    if (window.SLEEPER && typeof window.SLEEPER.adjustStatsForLeague === 'function') {
      const scoring = PC_SCORING[PC.scoring] || PC_SCORING.ppr;
      const enriched = pos ? Object.assign({}, s, { pos: pos }) : s;
      const out = window.SLEEPER.adjustStatsForLeague(enriched, scoring);
      return (out && typeof out.fantasyPts === 'number') ? out.fantasyPts : 0;
    }
    // Defensive fallback — full PPR + 4pt TD baseline.
    return (Number(s.passYards)  || 0) * 0.04
         + (Number(s.passTd)     || 0) * 4
         - (Number(s.passInts)   || 0) * 2
         + (Number(s.rushYards)  || 0) * 0.1
         + (Number(s.rushTd)     || 0) * 6
         + (Number(s.recYards)   || 0) * 0.1
         + (Number(s.recTd)      || 0) * 6
         + (Number(s.rec)        || 0) * 1
         - (Number(s.fumbles)    || 0) * 2;
  }

  // Sum a list of weekly records into one totals object. Skips non-numeric
  // fields (opponent, seasonType) so they don't break the addition.
  function _pcAggregateWeeks(weeks) {
    const sums = {};
    weeks.forEach(w => {
      Object.keys(w).forEach(k => {
        if (typeof w[k] !== 'number') return;
        sums[k] = (sums[k] || 0) + w[k];
      });
    });
    sums.games = weeks.length;
    return sums;
  }

  function _pcLastNAggregate(name, n) {
    const stats = _pcGetStats(name);
    const cur = _pcCurrentSeason();
    const season = stats && stats.seasons && stats.seasons[cur];
    if (!season || !season.weeks) return null;
    const weekList = Object.keys(season.weeks)
      .filter(k => season.weeks[k] && season.weeks[k].games)
      .map(k => ({ wk: Number(k), ...season.weeks[k] }));
    if (!weekList.length) return null;
    weekList.sort((a, b) => b.wk - a.wk);
    const slice = weekList.slice(0, n);
    return _pcAggregateWeeks(slice);
  }

  // Row definitions for season-stat groups. Each row knows how to read its
  // stat from a stats record, how to format the displayed value, whether
  // higher or lower is better, and whether to divide by games for per-game.
  function _pcSeasonStatRows() {
    return [
      { key: 'games',      label: 'Games',      mode: 'max', perGame: false, get: s => s.games || 0 },
      { key: 'fpts',       label: 'FPTS',       mode: 'max', perGame: true,  get: (s, pos) => _pcStdFpts(s, pos) },
      { key: 'passYards',  label: 'Pass Yds',   mode: 'max', perGame: true,  get: s => s.passYards || 0 },
      { key: 'passTd',     label: 'Pass TD',    mode: 'max', perGame: true,  get: s => s.passTd || 0 },
      { key: 'passInts',   label: 'INT',        mode: 'min', perGame: true,  get: s => s.passInts || 0 },
      { key: 'rushAtt',    label: 'Rush Att',   mode: 'max', perGame: true,  get: s => s.rushAtt || 0 },
      { key: 'rushYards',  label: 'Rush Yds',   mode: 'max', perGame: true,  get: s => s.rushYards || 0 },
      { key: 'rushTd',     label: 'Rush TD',    mode: 'max', perGame: true,  get: s => s.rushTd || 0 },
      { key: 'targets',    label: 'Targets',    mode: 'max', perGame: true,  get: s => s.targets || 0 },
      { key: 'rec',        label: 'Rec',        mode: 'max', perGame: true,  get: s => s.rec || 0 },
      { key: 'recYards',   label: 'Rec Yds',    mode: 'max', perGame: true,  get: s => s.recYards || 0 },
      { key: 'recTd',      label: 'Rec TD',     mode: 'max', perGame: true,  get: s => s.recTd || 0 },
    ];
  }

  // Pick the best index (lowest or highest) skipping null cells.
  function _pcBestIdx(values, mode) {
    let bestIdx = -1, bestVal = null;
    values.forEach((v, i) => {
      if (v == null || isNaN(v)) return;
      if (bestVal == null) { bestIdx = i; bestVal = v; return; }
      if (mode === 'min' ? v < bestVal : v > bestVal) {
        bestIdx = i; bestVal = v;
      }
    });
    // No highlight when all values are equal (tie) or only one valid cell
    const validVals = values.filter(v => v != null && !isNaN(v));
    if (validVals.length < 2) return -1;
    if (validVals.every(v => v === validVals[0])) return -1;
    return bestIdx;
  }

  // Render a stat-table row from raw numeric values + a formatter.
  function _pcTableStatRow(label, values, opts) {
    opts = opts || {};
    const fmt = opts.fmt || (v => v == null ? '—' : Number(v).toLocaleString());
    const bestIdx = opts.bestIdx != null ? opts.bestIdx : _pcBestIdx(values, opts.mode || 'max');
    const cells = values.map((v, i) => {
      const empty = (v == null || (typeof v === 'number' && v === 0 && opts.zeroAsEmpty !== false));
      const cellClass = 'pc-table-row-cell'
        + (empty ? ' is-empty' : '')
        + (i === bestIdx && !empty ? ' is-best' : '');
      return `<div class="${cellClass}">${empty ? '—' : fmt(v)}</div>`;
    }).join('');
    return `
      <div class="pc-table-row">
        <div class="pc-table-row-label">${label}</div>
        ${cells}
      </div>`;
  }

  // Trade Value row group — ADP overall, ADP pos rank, FP value, trend.
  function _pcTableTradeValueGroup() {
    const fps = PC.players.map(n => n ? (window.FP_VALUES || {})[n] : null);
    while (fps.length < 4) fps.push(null);
    const curYear = _pcCurrentSeason();
    const adp = PC.players.map(n => n ? _pcGetAdpForYear(n, curYear) : null);

    const fmtRank   = v => v == null ? '—' : '#' + Math.round(v);
    const fmtVal    = v => v == null ? '—' : Math.round(v).toLocaleString();
    const fmtTrend  = v => {
      if (v == null) return '—';
      const n = Number(v);
      if (!n) return '0';
      return (n > 0 ? '+' : '') + Math.round(n).toLocaleString();
    };

    const adpOverall = adp.map(a => a && a.rank != null ? a.rank : null);
    const adpPosRk   = adp.map(a => a && a.posRank   ? a.posRank : null);
    const fpVal      = fps.map(fp => fp ? Number((PC.fmt === '1qb' ? fp.value1qb : (fp.valueSf != null ? fp.valueSf : fp.value)) || 0) : null);
    const trend      = fps.map(fp => fp ? (fp.trend != null ? Number(fp.trend) : null) : null);

    return `
      <div class="pc-table-rowgroup">
        <div class="pc-table-rowgroup-title">Trade Value · ${PC.fmt === '1qb' ? '1QB' : 'SF'}</div>
        ${_pcTableStatRow('FP value',     fpVal,      { fmt: fmtVal, mode: 'max' })}
        ${_pcTableStatRow('30d trend',    trend,      { fmt: fmtTrend, mode: 'max', zeroAsEmpty: false })}
        ${_pcTableStatRow(`${curYear} ADP overall`, adpOverall, { fmt: fmtRank, mode: 'min' })}
        ${_pcTableStatRow(`${curYear} ADP pos rank`,
          adpPosRk.map(v => v ? Number(String(v).match(/(\d+)$/)?.[1]) : null),
          { fmt: (v, i) => adpPosRk[i] || '—', mode: 'min' })}
      </div>`;
  }

  // Season-stats group for a given year. Skips rows where every player
  // has zero — keeps the table tight for cross-position comparisons.
  function _pcTableSeasonGroup(year) {
    const stats = PC.players.map(n => n ? _pcGetStats(n) : null);
    const seasons = stats.map(s => s && s.seasons && s.seasons[year]);
    while (seasons.length < 4) seasons.push(null);

    const rowDefs = _pcSeasonStatRows();
    const positions = PC.players.map(n => _pcPlayerPos(n));
    const rows = rowDefs.map(def => {
      const values = seasons.map((s, i) => s ? def.get(s, positions[i]) : null);
      // Skip the row if every player is null/zero
      const anyNonZero = values.some(v => v != null && v !== 0);
      if (!anyNonZero) return '';
      const fmt = def.key === 'fpts' ? (v => Number(v).toFixed(1)) : (v => Number(v).toLocaleString());
      return _pcTableStatRow(def.label, values, { fmt, mode: def.mode });
    }).filter(Boolean).join('');

    return `
      <div class="pc-table-rowgroup">
        <div class="pc-table-rowgroup-title">${year} Season Stats · ${PC_SCORING_LABELS[PC.scoring] || 'PPR'}</div>
        ${rows || `<div class="pc-table-row"><div class="pc-table-row-label">No ${year} stats</div><div class="pc-table-row-cell is-empty" style="grid-column:2 / -1">No season data for any selected player.</div></div>`}
      </div>`;
  }

  // Last-N games group. Shows per-game averages aggregated over the N
  // most recent games in the current season's weeks.
  function _pcTableLastNGroup(n) {
    const aggs = PC.players.map(name => name ? _pcLastNAggregate(name, n) : null);
    while (aggs.length < 4) aggs.push(null);

    const games = aggs.map(a => a && a.games ? a.games : null);
    const rowDefs = _pcSeasonStatRows().filter(d => d.perGame); // skip "Games" row
    const positions = PC.players.map(n => _pcPlayerPos(n));
    const rows = rowDefs.map(def => {
      const totals = aggs.map((a, i) => a ? def.get(a, positions[i]) : null);
      const perGame = totals.map((t, i) => {
        if (t == null || aggs[i] == null) return null;
        const g = aggs[i].games || 0;
        return g > 0 ? (t / g) : null;
      });
      const anyNonZero = perGame.some(v => v != null && v !== 0);
      if (!anyNonZero) return '';
      const fmt = v => Number(v).toFixed(1);
      return _pcTableStatRow(def.label + '/G', perGame, { fmt, mode: def.mode });
    }).filter(Boolean).join('');

    // Also surface the actual games-counted (so the user knows when a slot
    // had fewer than N games available)
    const gamesRow = _pcTableStatRow('Games counted', games, { fmt: v => v + '', mode: 'max', zeroAsEmpty: false });

    return `
      <div class="pc-table-rowgroup">
        <div class="pc-table-rowgroup-title">Last ${n} Games · Per-Game · ${_pcCurrentSeason()} Season · ${PC_SCORING_LABELS[PC.scoring] || 'PPR'}</div>
        ${gamesRow}
        ${rows || `<div class="pc-table-row"><div class="pc-table-row-label">No splits</div><div class="pc-table-row-cell is-empty" style="grid-column:2 / -1">No weekly data in the last ${n} games for any selected player.</div></div>`}
      </div>`;
  }

  // Window toggle UI (4 / 8 / 16) for the Last-N group.
  function _pcTableGamesToggle() {
    const btns = PC_GAMES.map(n => `
      <button class="pc-toggle-btn${PC.games === n ? ' is-active' : ''}"
              onclick="_pcSetGames(${n})">${n}G</button>
    `).join('');
    return `
      <div class="pc-control-group">
        <span class="pc-control-label">Window</span>
        ${btns}
      </div>`;
  }

  function _pcRenderTable() {
    // Pad PC.players to 4 slots for rendering
    const slots = PC.players.slice();
    while (slots.length < 4) slots.push(null);
    PC.players = slots;

    const picker = slots.map((_, i) => _pcTableSlot(i)).join('');
    const hasAny = slots.some(Boolean);

    if (!hasAny) {
      return `
        <div class="pc-table-mode">
          <div class="pc-table-picker">${picker}</div>
          <div class="pc-chart-empty" style="min-height:140px;display:flex;align-items:center;justify-content:center">
            Add up to 4 players above to compare side-by-side.
          </div>
        </div>`;
    }

    const curYear = _pcCurrentSeason();
    return `
      <div class="pc-table-mode">
        <div class="pc-table-picker">${picker}</div>
        ${_pcTableIdentityGroup()}
        ${_pcTableTradeValueGroup()}
        ${_pcTableSeasonGroup(curYear)}
        <div class="pc-controls" style="margin-top:0;margin-bottom:-8px">
          ${_pcTableGamesToggle()}
        </div>
        ${_pcTableLastNGroup(PC.games)}
      </div>`;
  }

  // ─── Multi-player Profile mode (Phase 6a) ──────────────────────────
  // Triggered when PC.mode === 'profile' AND PC.players.length >= 2.
  // Cards compress: photo + name + meta inline, info column hidden.
  // Up to 3 players, with a "+ Add comparison" empty slot when N < 3.

  // Compare two values and return a CSS class for the winner/loser.
  // mode = 'max' (higher = better) or 'min' (lower = better).
  function _pcCmpClass(v, vOther, mode) {
    if (v == null || isNaN(v))            return 'is-empty';
    if (vOther == null || isNaN(vOther))  return ''; // other side missing this metric
    if (v === vOther)                     return 'is-tied';
    if (mode === 'min') return v < vOther ? 'is-best' : 'is-worst';
    return v > vOther ? 'is-best' : 'is-worst';
  }

  // Build the position-aware metric-table HTML for one player, color-
  // coded against the OTHER player in PC.players.
  function _pcMultiMetricTable(name, otherName) {
    const data = _pcCardData(name);
    const otherData = otherName ? _pcCardData(otherName) : null;
    if (!data) return '';
    const fp = data.fp, fpOther = otherData ? otherData.fp : null;
    const stats = data.stats, statsOther = otherData ? otherData.stats : null;
    const cur = _pcCurrentSeason();
    const season = stats && stats.seasons && stats.seasons[cur];
    const seasonOther = statsOther && statsOther.seasons && statsOther.seasons[cur];
    const pos = fp.pos || '?';

    // Row helper — formats + compares + emits HTML.
    const row = (label, val, valOther, mode, formatter) => {
      const cls = _pcCmpClass(val, valOther, mode);
      const empty = (val == null || isNaN(val));
      const txt = empty ? '—' : (formatter ? formatter(val) : Number(val).toLocaleString());
      return `<div class="pc-cm-row">
        <span class="pc-cm-label">${label}</span>
        <span class="pc-cm-value ${cls}">${txt}</span>
      </div>`;
    };
    const section = (title) => `<div class="pc-cm-section">${title}</div>`;
    const s = (rec, key) => rec ? (rec[key] != null ? Number(rec[key]) : null) : null;

    // ─── Identity section (universal) ─────────────────────────────
    const valKey = PC.fmt === '1qb' ? 'value1qb' : 'valueSf';
    const fpVal      = fp ? Number((fp[valKey] != null ? fp[valKey] : fp.value) || 0) : null;
    const fpValOther = fpOther ? Number((fpOther[valKey] != null ? fpOther[valKey] : fpOther.value) || 0) : null;
    const age       = (fp.age != null) ? Number(fp.age) : null;
    const ageOther  = (fpOther && fpOther.age != null) ? Number(fpOther.age) : null;
    const ppg       = (fp.ppg != null) ? Number(fp.ppg) : null;
    const ppgOther  = (fpOther && fpOther.ppg != null) ? Number(fpOther.ppg) : null;
    const trend      = (fp.trend != null) ? Number(fp.trend) : null;
    const trendOther = (fpOther && fpOther.trend != null) ? Number(fpOther.trend) : null;
    const posRankN      = fp.posRank ? Number(String(fp.posRank).match(/(\d+)$/) ? String(fp.posRank).match(/(\d+)$/)[1] : null) : null;
    const posRankOtherN = fpOther && fpOther.posRank ? Number(String(fpOther.posRank).match(/(\d+)$/) ? String(fpOther.posRank).match(/(\d+)$/)[1] : null) : null;

    let html = section('Identity · Trade value');
    // Pos Rank — display the string ("QB1") but compare on the numeric tail
    html += `<div class="pc-cm-row">
      <span class="pc-cm-label">Pos Rank</span>
      <span class="pc-cm-value ${_pcCmpClass(posRankN, posRankOtherN, 'min')}">${fp.posRank || '—'}</span>
    </div>`;
    html += row(`FP ${PC.fmt === '1qb' ? '1QB' : 'SF'} Value`, fpVal, fpValOther, 'max');
    html += row('30d trend', trend, trendOther, 'max', v => (v > 0 ? '+' : '') + Math.round(v).toLocaleString());
    html += row('PPG (overall)', ppg, ppgOther, 'max', v => Number(v).toFixed(1));
    html += row('Age', age, ageOther, 'min', v => Number(v).toFixed(1));

    // ─── Position-specific sections (current season totals) ───────
    if (pos === 'QB') {
      const cmpPct      = (season && season.passAtt > 0)      ? (season.passCmp      / season.passAtt      * 100) : null;
      const cmpPctOther = (seasonOther && seasonOther.passAtt > 0) ? (seasonOther.passCmp / seasonOther.passAtt * 100) : null;
      html += section('Passing · ' + cur);
      html += row('Games',     s(season,'games'),     s(seasonOther,'games'),     'max');
      html += row('Pass Yds',  s(season,'passYards'), s(seasonOther,'passYards'), 'max');
      html += row('Pass TDs',  s(season,'passTd'),    s(seasonOther,'passTd'),    'max');
      html += row('Int',       s(season,'passInts'),  s(seasonOther,'passInts'),  'min');
      html += row('Cmp %',     cmpPct,                cmpPctOther,                'max', v => Number(v).toFixed(1) + '%');
      html += section('Rushing · ' + cur);
      html += row('Rush Att',  s(season,'rushAtt'),   s(seasonOther,'rushAtt'),   'max');
      html += row('Rush Yds',  s(season,'rushYards'), s(seasonOther,'rushYards'), 'max');
      html += row('Rush TDs',  s(season,'rushTd'),    s(seasonOther,'rushTd'),    'max');
    } else if (pos === 'RB') {
      const ypc      = (season      && season.rushAtt > 0)      ? (season.rushYards      / season.rushAtt)      : null;
      const ypcOther = (seasonOther && seasonOther.rushAtt > 0) ? (seasonOther.rushYards / seasonOther.rushAtt) : null;
      html += section('Rushing · ' + cur);
      html += row('Games',     s(season,'games'),     s(seasonOther,'games'),     'max');
      html += row('Rush Att',  s(season,'rushAtt'),   s(seasonOther,'rushAtt'),   'max');
      html += row('Rush Yds',  s(season,'rushYards'), s(seasonOther,'rushYards'), 'max');
      html += row('YPC',       ypc,                   ypcOther,                   'max', v => Number(v).toFixed(2));
      html += row('Rush TDs',  s(season,'rushTd'),    s(seasonOther,'rushTd'),    'max');
      html += section('Receiving · ' + cur);
      html += row('Targets',   s(season,'targets'),   s(seasonOther,'targets'),   'max');
      html += row('Rec',       s(season,'rec'),       s(seasonOther,'rec'),       'max');
      html += row('Rec Yds',   s(season,'recYards'),  s(seasonOther,'recYards'),  'max');
      html += row('Rec TDs',   s(season,'recTd'),     s(seasonOther,'recTd'),     'max');
    } else { // WR / TE
      const catchPct      = (season      && season.targets > 0)      ? (season.rec      / season.targets      * 100) : null;
      const catchPctOther = (seasonOther && seasonOther.targets > 0) ? (seasonOther.rec / seasonOther.targets * 100) : null;
      const ypt           = (season      && season.targets > 0)      ? (season.recYards      / season.targets)      : null;
      const yptOther      = (seasonOther && seasonOther.targets > 0) ? (seasonOther.recYards / seasonOther.targets) : null;
      const ypr           = (season      && season.rec > 0)          ? (season.recYards      / season.rec)          : null;
      const yprOther      = (seasonOther && seasonOther.rec > 0)     ? (seasonOther.recYards / seasonOther.rec)     : null;
      html += section('Receiving · ' + cur);
      html += row('Games',       s(season,'games'),    s(seasonOther,'games'),    'max');
      html += row('Targets',     s(season,'targets'),  s(seasonOther,'targets'),  'max');
      html += row('Rec',         s(season,'rec'),      s(seasonOther,'rec'),      'max');
      html += row('Rec Yds',     s(season,'recYards'), s(seasonOther,'recYards'), 'max');
      html += row('Rec TDs',     s(season,'recTd'),    s(seasonOther,'recTd'),    'max');
      html += row('Catch %',     catchPct,             catchPctOther,             'max', v => Number(v).toFixed(1) + '%');
      html += row('Yards/Tgt',   ypt,                  yptOther,                  'max', v => Number(v).toFixed(2));
      html += row('Yards/Rec',   ypr,                  yprOther,                  'max', v => Number(v).toFixed(2));
    }

    return `<div class="pc-cm-table">${html}</div>`;
  }

  // Tab content rendered INSIDE each card. Dispatches by PC.tab so each
  // card becomes a self-contained mini-profile that swaps lenses via
  // the global tab bar. Single source of truth for which tab is active.
  function _pcCardTabContent(name, otherName) {
    const data = _pcCardData(name);
    if (!data) return '<div class="pc-hist-empty">No data.</div>';
    const fp = data.fp;
    const idx = PC.players.indexOf(name);

    switch (PC.tab) {
      case 'adp': {
        const adpReady = !!window.PC_ADP_BY_YEAR;
        return adpReady
          ? `${_pcAdpHistoryChart(name)}${_pcAdpHistoryRow(name, fp)}`
          : `<div class="pc-hist-empty">Loading per-year ADP files…</div>`;
      }
      case 'value':
        return _pcFpValueSection(name, fp);

      case 'heatmap':
        // Mount div with per-card index; post-render hook fires Heatmap.render
        return `<div id="pc-card-heatmap-mount-${idx}" class="pc-hist-heatmap-wrap"></div>`;

      case 'career': {
        const stats = data.stats;
        if (!stats || !stats.seasons) {
          return `<div class="pc-hist-empty">No data-suite career stats available.</div>`;
        }
        const pos = fp.pos || stats.pos || '?';
        const cols = _pcMultiCareerColumns(pos);
        const years = Object.keys(stats.seasons).sort((a, b) => Number(b) - Number(a));
        if (!years.length) return `<div class="pc-hist-empty">No yearly stats data available.</div>`;
        const headerRow = `<thead><tr>
          <th>Year</th>
          ${cols.map(c => `<th>${c.label}</th>`).join('')}
        </tr></thead>`;
        const bodyRows = years.map(yr => {
          const s = stats.seasons[yr];
          if (!s || !s.games) return null;
          const cells = cols.map(c => {
            if (c.compute) return `<td>${c.compute(s)}</td>`;
            const v = s[c.key];
            const txt = (v == null) ? '—' : (typeof v === 'number' ? Number(v).toLocaleString() : v);
            return `<td>${txt}</td>`;
          }).join('');
          return `<tr><td class="year-cell">${yr}</td>${cells}</tr>`;
        }).filter(Boolean).join('');
        return `<div class="pc-mc-table-wrap"><table class="pc-mc-table">${headerRow}<tbody>${bodyRows}</tbody></table></div>`;
      }

      case 'trades': {
        let trades = [];
        if (typeof window._buildTradesFromMvs === 'function') {
          try {
            const all = window._buildTradesFromMvs();
            trades = (all || []).filter(t => (t.players || []).some(p => p && p.name === name));
          } catch (e) { trades = []; }
        }
        if (!trades.length) {
          return `<div class="pc-hist-empty" style="padding:24px 14px">No recent trades involving ${_escAttr(name)}.</div>`;
        }
        if (typeof window.tradeCardHtml !== 'function') {
          return `<div class="pc-hist-empty">tradeCardHtml renderer not loaded.</div>`;
        }
        const cards = trades.map(t => {
          try { return window.tradeCardHtml(t); } catch (e) { return ''; }
        }).join('');
        return `
          <div class="pc-hist-trades-count"><strong>${trades.length}</strong>${trades.length === 1 ? ' trade' : ' trades'} found</div>
          <div class="pc-hist-trades-wrap">${cards}</div>`;
      }

      case 'profile':
      default: {
        // Profile tab content = metric table + Background tiles below.
        const sleeperReady = !!data.sleeper;
        const metric = _pcMultiMetricTable(name, otherName);
        const bgTiles = sleeperReady
          ? `<div class="pc-card-subsection-title">Background</div><div class="pc-tiles">${_pcBackgroundTiles(data)}</div>`
          : `<div class="pc-card-subsection-title">Background</div><div class="pc-hist-empty">Loading background data…</div>`;
        return `${metric}${bgTiles}`;
      }
    }
  }

  function _pcRenderCardMulti(name) {
    const data = _pcCardData(name);
    if (!data) {
      return `<div class="pc-card"><div class="pc-empty">Not found: ${_escAttr(name)}</div></div>`;
    }
    const idx = PC.players.indexOf(name);
    const otherName = PC.players.find(n => n && n !== name) || null;
    const fp = data.fp;
    const sp = data.sleeper || {};
    const pos  = fp.pos || (data.stats && data.stats.pos)  || '?';
    const team = fp.team || (data.stats && data.stats.team) || '';
    const ht   = sp.height ? _pcFmtHt(sp.height) : '—';
    const wt   = sp.weight ? (sp.weight + ' lbs') : '—';
    const age  = (fp.age != null) ? Number(fp.age).toFixed(1) : '—';
    const yrsRaw = sp.years_exp;
    const yrs  = (yrsRaw === 0) ? 'Rookie' : (yrsRaw != null ? (yrsRaw + ' yrs') : '—');
    const photo = _pcPhoto(data.sid);
    const teamLogo = (team && window.TeamHelpers && typeof window.TeamHelpers.logoImg === 'function')
      ? window.TeamHelpers.logoImg(team, { size: 22, coin: true })
      : (team || '');
    const yearShort = "'" + String(_pcCurrentSeason()).slice(-2);

    return `
      <div class="pc-card" style="--pos-color: ${_pcPosColor(pos)}">
        <button class="pc-card-remove" onclick="_pcRemoveProfilePlayer(${idx})" title="Remove">✕</button>
        <div class="pc-card-header">
          <span class="pos-pill ${pos}">${pos}</span>
          <span class="pc-card-year">${yearShort}</span>
          <span class="pc-card-team">${teamLogo}</span>
        </div>
        <div class="pc-card-photo-wrap">
          ${photo
            ? `<img class="pc-card-photo" src="${photo}" alt="${_escAttr(name)}" onerror="this.style.display='none'; if(this.nextElementSibling)this.nextElementSibling.style.display='flex';">`
            : ''}
          <div class="pc-card-photo-fallback" ${photo ? 'style="display:none;position:absolute"' : ''}>${pos || '?'}</div>
        </div>
        <div class="pc-cm-identity">
          <div class="pc-cm-identity-name">${_escAttr(name)}</div>
          <div class="pc-cm-identity-meta">
            <span class="pos-pill ${pos}">${pos}</span>
            <span>${team || '—'}</span>
            <span class="sep">·</span>
            <span>Age ${age}</span>
            <span class="sep">·</span>
            <span>${ht} / ${wt}</span>
            <span class="sep">·</span>
            <span>${yrs}</span>
          </div>
        </div>
        <div class="pc-card-tab-body">
          ${_pcCardTabContent(name, otherName)}
        </div>
      </div>`;
  }

  function _pcRenderAddSlot() {
    return `
      <div class="pc-add-slot">
        <div class="pc-add-slot-label">+ Add comparison</div>
        <div class="pc-add-slot-sub">Up to 3 total</div>
        <input class="pc-add-slot-input" type="text" placeholder="Search player…"
               autocomplete="off" spellcheck="false"
               oninput="_pcAddSlotSearchInput(event)"
               onblur="setTimeout(() => { const r = document.getElementById('pc-add-slot-results'); if (r) r.classList.remove('is-open'); }, 200)">
        <div class="pc-add-slot-results" id="pc-add-slot-results"></div>
      </div>`;
  }

  function _pcAddSlotSearchInput(e) {
    clearTimeout(PC.searchTimer);
    const q = (e.target.value || '').trim().toLowerCase();
    PC.searchTimer = setTimeout(() => {
      const resultsEl = document.getElementById('pc-add-slot-results');
      if (!resultsEl) return;
      if (!q) { resultsEl.innerHTML = ''; resultsEl.classList.remove('is-open'); return; }
      const taken = new Set(PC.players || []);
      const matches = Object.keys(window.FP_VALUES || {})
        .filter(n => !taken.has(n) && n.toLowerCase().includes(q))
        .sort((a, b) => (window.FP_VALUES[a].rank || 9999) - (window.FP_VALUES[b].rank || 9999))
        .slice(0, 12);
      if (!matches.length) {
        resultsEl.innerHTML = '<div class="pc-search-item is-empty">No matches</div>';
        resultsEl.classList.add('is-open');
        return;
      }
      resultsEl.innerHTML = matches.map(n => {
        const fp = window.FP_VALUES[n];
        const safeName = n.replace(/'/g, "\\'");
        return `<div class="pc-search-item" onmousedown="_pcAddProfilePlayer('${safeName}')">
          <span class="pos-pill ${fp.pos || ''}">${fp.pos || '?'}</span>
          <span class="pc-search-name">${n}</span>
          <span class="pc-search-meta">${fp.team || ''}${fp.posRank ? ' · ' + fp.posRank : ''}</span>
        </div>`;
      }).join('');
      resultsEl.classList.add('is-open');
    }, 60);
  }


  // Render the multi-player profile view. Hero row of compressed cards
  // + "Add" slot when N < 3. Sub-tabs from PC.tab still drive content;
  // Phase 6a only multi-rendered Profile tab. Other tabs render the
  // first player only (placeholder) until phases 6b/6c.
  function _pcRenderProfileMulti() {
    // Tab bar sits ABOVE the cards row. Each card includes its active-
    // tab content inline (via _pcCardTabContent). No separate .pc-
    // historical block in multi mode — the cards ARE the content.
    const tabs = [
      { key: 'profile', label: 'Profile' },
      { key: 'adp',     label: 'ADP' },
      { key: 'heatmap', label: 'Heatmap' },
      { key: 'value',   label: 'Value' },
      { key: 'career',  label: 'Career' },
      { key: 'trades',  label: 'Trades' },
    ];
    const tabBar = tabs.map(t => `
      <button class="pc-tab-btn${PC.tab === t.key ? ' is-active' : ''}"
              data-tab="${t.key}"
              onclick="_pcSetTab('${t.key}')">${t.label}</button>
    `).join('');

    const cards = PC.players.map(name => _pcRenderCardMulti(name)).join('');

    document.getElementById('pc-app').innerHTML = `
      <div class="pc-historical" id="pc-historical">
        <div class="pc-tabs-bar">${tabBar}</div>
        <div class="pc-hero-row is-multi">${cards}</div>
      </div>`;

    // Post-render mount hooks for the Heatmap tab. Per-card mount IDs
    // now (pc-card-heatmap-mount-{idx}) since heatmap lives inside the
    // card body, not in a separate panel.
    if (PC.tab === 'heatmap' && window.Heatmap && typeof window.Heatmap.render === 'function') {
      PC.players.forEach((name, i) => {
        const el = document.getElementById('pc-card-heatmap-mount-' + i);
        const fp = (window.FP_VALUES || {})[name] || {};
        const sid = fp.sleeperId || (window.SLEEPER_IDS || {})[name];
        if (el && sid) {
          try { window.Heatmap.render(el, sid); } catch (e) {}
        }
      });
    }
  }

  // ─── Main render dispatcher ────────────────────────────────────────
  function _pcRender() {
    // Sync toggle visual state
    document.querySelectorAll('.pc-toggle-btn[data-mode]').forEach(b => {
      b.classList.toggle('is-active', b.dataset.mode === PC.mode);
    });
    document.querySelectorAll('.pc-toggle-btn[data-fmt]').forEach(b => {
      b.classList.toggle('is-active', b.dataset.fmt === PC.fmt);
    });
    document.querySelectorAll('.pc-toggle-btn[data-scoring]').forEach(b => {
      b.classList.toggle('is-active', b.dataset.scoring === PC.scoring);
    });
    if (PC.mode === 'profile') {
      if (PC.players.length === 0)      _pcRenderEmpty();
      else if (PC.players.length === 1) _pcRenderProfile(PC.players[0]);
      else                              _pcRenderProfileMulti();
    } else {
      // Table mode: 2-4 player side-by-side stat-row comparison
      document.getElementById('pc-app').innerHTML = _pcRenderTable();
    }
  }

  // ─── Bootstrap ─────────────────────────────────────────────────────
  document.addEventListener('fpts:data-ready', function () {
    const overlay = document.getElementById('_fp-loading');
    if (overlay) overlay.style.display = 'none';
    _pcParseHash();
    _pcRender();
    window.addEventListener('hashchange', () => { _pcParseHash(); _pcRender(); });
    // Eager-load the Sleeper player DB so subsequent profile renders have
    // height / weight / years_exp without a second render-then-re-render.
    _pcEnsureSleeperDb();
  });
</script>

</body>
</html>
