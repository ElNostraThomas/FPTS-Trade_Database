<style>
  /* ════════════════════════════════════════════════════════════════════════
     RANKINGS PAGE STYLES — page-specific only. Brand variables, fonts,
     and the calendar popup live in brand.css + adp-comparator.js respectively.
     ════════════════════════════════════════════════════════════════════════ */

  /* PAGE */
  .page { max-width: 1440px; margin: 0 auto; padding: 0 5px; }
  .page-header { padding: 32px 0 24px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 1px solid var(--border); margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
  .page-title { font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic; font-size: 36px; color: var(--white); text-transform: uppercase; line-height: 1; }
  .page-title span { color: var(--red); }
  .page-subtitle { font-family: 'Mulish', sans-serif; font-size: 13px; color: var(--white); opacity: 1; margin-top: 6px; }
  .page-stat { text-align: right; font-family: 'Mulish', sans-serif; font-size: 11px; color: var(--muted); }

  /* ANALYST TABS — top-level navigation across data sources */
  .rk-tabs {
    display: flex; align-items: stretch; gap: 0;
    margin-bottom: 14px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .rk-tab {
    background: transparent; color: var(--muted); border: none;
    padding: 12px 20px; cursor: pointer;
    font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic;
    font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
    border-bottom: 3px solid transparent; margin-bottom: -1px;
    transition: color .15s, border-color .15s;
  }
  .rk-tab:hover:not(.disabled) { color: var(--white); }
  .rk-tab.active { color: var(--red); border-bottom-color: var(--red); }
  .rk-tab.disabled { opacity: .35; cursor: not-allowed; }
  .rk-tab .rk-tab-hint { font-size: 9px; opacity: .7; margin-left: 4px; font-weight: 700; font-style: normal; letter-spacing: 0; }

  /* CONTROLS BAR — format toggle + filters + search */
  .rk-controls {
    display: flex; gap: 10px; align-items: center; margin-bottom: 20px;
    flex-wrap: wrap; padding: 12px 14px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .rk-control-label { font-family: 'Mulish', sans-serif; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
  .rk-format-toggle { display: flex; gap: 0; }
  .rk-format-btn {
    background: transparent; color: var(--white); border: 1px solid var(--border2);
    font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic;
    font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    padding: 6px 14px; cursor: pointer; transition: all .15s;
  }
  .rk-format-btn:not(:last-child) { border-right: none; }
  .rk-format-btn:hover:not(.disabled) { color: var(--red); }
  .rk-format-btn.active { background: var(--red); border-color: var(--red); color: var(--white); }
  .rk-format-btn.disabled { opacity: .35; cursor: not-allowed; }
  .rk-filter-select {
    font-family: 'Mulish', sans-serif; font-size: 12px;
    background: var(--surface2); color: var(--white); border: 1px solid var(--border2);
    padding: 6px 22px 6px 10px; cursor: pointer; appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M0 0l5 6 5-6z' fill='%23888'/></svg>");
    background-repeat: no-repeat; background-position: right 8px center;
  }
  .rk-search {
    background: var(--surface2); color: var(--white); border: 1px solid var(--border2);
    padding: 6px 10px; font-family: 'Mulish', sans-serif; font-size: 12px;
    min-width: 180px;
  }
  .rk-search::placeholder { color: var(--muted); }
  .rk-spacer { flex: 1; }

  /* TABLE */
  .rk-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--surface); border: 1px solid var(--border); }
  .rk-table { width: 100%; min-width: 1100px; border-collapse: collapse; font-size: 12px; }
  .rk-table thead th {
    background: var(--surface2); color: var(--muted);
    font-family: 'Mulish', sans-serif; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em;
    padding: 10px 8px; text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
    position: sticky; top: 0; z-index: 5;
  }
  .rk-table thead th:hover { color: var(--white); background: var(--surface); }
  .rk-table thead th.sorted { color: var(--red); }
  .rk-table thead th .sort-arrow { color: var(--red); margin-left: 4px; font-size: 9px; }
  .rk-table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--white); white-space: nowrap; }
  .rk-table tbody tr:hover td { background: var(--surface2); }
  .rk-table .col-num { text-align: right; font-variant-numeric: tabular-nums; }
  .rk-table .col-name { min-width: 160px; }
  .rk-table .col-change { text-align: center; padding: 6px 4px !important; }
  .rk-th-compare { padding-top: 6px !important; padding-bottom: 6px !important; }

  /* POS BADGE */
  .pos-badge { font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic; font-size: 11px; padding: 2px 7px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; min-width: 28px; }
  .pos-qb { background: var(--pos-qb-bg); color: var(--white); }
  .pos-rb { background: var(--pos-rb-bg); color: var(--white); }
  .pos-wr { background: var(--pos-wr-bg); color: var(--white); }
  .pos-te { background: var(--pos-te-bg); color: var(--white); }
  .pos-k  { background: var(--pos-k-bg);  color: var(--white); }

  /* PLAYER NAME — clickable to open shared drawer */
  .rk-player-name { font-family: 'Mulish', sans-serif; font-weight: 900; font-size: 13px; color: var(--white); cursor: pointer; transition: color .15s; }
  .rk-player-name:hover { color: var(--red); }
  .rk-rank-cell { font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic; color: var(--white); font-size: 13px; }
  .rk-trade-value { font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic; }

  /* EMPTY STATE */
  .rk-empty { padding: 60px 20px; text-align: center; color: var(--muted); font-family: 'Mulish', sans-serif; font-size: 14px; }

  /* MOBILE */
  @media (max-width: 768px) {
    .topnav { padding: 0 10px; gap: 8px; height: 48px; }
    .wordmark svg { height: 20px; }
    .nav-links { display: none !important; }
    .nav-stat { display: none !important; }
    .nav-right { gap: 8px; }
    .nav-badge { font-size: 9px; padding: 2px 6px; }
    .mobile-nav-select { display: block !important; }

    .page { padding: 0 8px !important; max-width: 100vw !important; }
    .page-header { flex-direction: column; align-items: flex-start; padding: 14px 0 12px; margin-bottom: 16px; }
    .page-title { font-size: 22px !important; }
    .page-subtitle { font-size: 11px; }

    .rk-tabs { overflow-x: auto; flex-wrap: nowrap; }
    .rk-tab { padding: 10px 14px; min-height: 36px; font-size: 11px; flex-shrink: 0; }
    .rk-controls { flex-direction: column; align-items: stretch; gap: 8px; }
    .rk-format-btn { padding: 8px 12px; min-height: 36px; font-size: 10px; }
    .rk-filter-select, .rk-search { width: 100%; min-height: 36px; font-size: 13px; }

    .rk-table thead th { padding: 8px 6px; font-size: 9px; }
    .rk-table td { padding: 6px; font-size: 11px; }

    /* Bottom safe-area */
    body { padding-bottom: max(20px, env(safe-area-inset-bottom)) !important; }
    .page { padding-bottom: max(24px, calc(env(safe-area-inset-bottom) + 12px)) !important; }
  }

  /* CROSS-PAGE BUTTONS (legacy from tiers; not used here yet but matches brand) */
  .fpts-xpage-btn { font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic; font-size: 10px; color: var(--white); background: transparent; border: 1px solid var(--border2); padding: 5px 10px; cursor: pointer; text-transform: uppercase; letter-spacing: .06em; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: all .15s; white-space: nowrap; }
  .fpts-xpage-btn:hover { border-color: var(--red); color: var(--red); }
</style>

      <option value="TE">TE</option>
    </select>

    <span class="rk-spacer"></span>

    <input type="search" class="rk-search" id="rk-search" placeholder="Search player…" oninput="setSearch(this.value)">
  </div>

  <!-- Table body (rendered by JS) -->
  <div id="rankings-body"></div>

</main>

<!-- Required mount divs for the shared player drawer -->
<div id="pp-mvs-extras"></div>
<div id="pp-articles-mount"></div>
<div id="pp-league-context"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  RANKINGS PAGE — page-specific JS
// ═══════════════════════════════════════════════════════════════════════════

// ── Theme toggle (shared across all pages) ─────────────────────────────────
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = next === 'dark' ? 'LIGHT' : 'DARK';
  try { localStorage.setItem('fpts-theme', next); } catch (e) {}
}
(function _initTheme() {
  try {
    const saved = localStorage.getItem('fpts-theme');
    if (saved === 'light') toggleTheme();
  } catch (e) {}
})();

// ── STATE ──────────────────────────────────────────────────────────────────
const STATE = {
  analyst: 'overall',
  format:  'sf',
  position: 'all',
  search:  '',
  sort:    { col: 'rank', dir: 'asc' },
};

let RANKINGS_AVAILABLE = [];   // populated from manifest.json
let RANKINGS_CACHE     = Object.create(null);   // { "overall-sf": <payload>, ... }
let ACTIVE_PLAYERS     = [];   // shortcut to RANKINGS_CACHE[comboKey].players

// Canonical format set surfaced in the toggle (in display order). Format
// names are fixed fantasy-football scoring variants — these are real and
// stay hardcoded. Combos missing from the manifest render disabled.
const FORMATS = [
  { key: 'sf',      label: 'SF' },
  { key: 'sf-tep',  label: 'SF + TEP' },
  { key: '1qb',     label: '1QB' },
  { key: '1qb-tep', label: '1QB + TEP' },
];

// Analyst list is manifest-driven — no hardcoded names. Whatever analyst
// keys appear in data/rankings/manifest.json get tabs; nothing else.
// _capitalize() formats the key for display if no explicit label is given.
function _capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function _analystLabel(key) {
  // Use the manifest-provided label if any entry for this analyst has one
  // (e.g. label="Overall Consensus — Superflex" → analyst label "Overall").
  // Otherwise fall back to a Title-Case'd version of the key.
  const entry = RANKINGS_AVAILABLE.find(c => c.analyst === key);
  if (entry && entry.label) {
    // Strip everything after the first " — " (format separator) for the tab label
    const before = entry.label.split('—')[0].split('-')[0].trim();
    if (before) return before;
  }
  return _capitalize(key);
}
function _uniqueAnalysts() {
  const seen = new Set();
  const out = [];
  for (const c of RANKINGS_AVAILABLE) {
    if (!seen.has(c.analyst)) { seen.add(c.analyst); out.push(c.analyst); }
  }
  return out;
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function _normName(name) {
  if (!name) return '';
  return String(name)
    .normalize('NFKD').replace(/[̀-ͯ]/g, '')
    .toLowerCase()
    .replace(/\b(jr|sr|ii|iii|iv|v)\.?\b/g, '')
    .replace(/[^a-z0-9]/g, '');
}

function _comboKey(analyst, format) { return analyst + '-' + format; }

function _comboAvailable(analyst, format) {
  return RANKINGS_AVAILABLE.some(c => c.analyst === analyst && c.format === format);
}

function _fmtCell(v) {
  if (v === '' || v === 'N/A' || v == null) return '<span style="color:var(--muted)">—</span>';
  return v;
}

function _fmtNumeric(v) {
  if (v === '' || v == null || (typeof v === 'number' && !isFinite(v))) {
    return '<span style="color:var(--muted)">—</span>';
  }
  return v;
}

// ── MANIFEST + COMBO LOADER ────────────────────────────────────────────────
function loadManifest() {
  const _v = '?v=' + (window.__DATA_VERSION || Date.now());
  return fetch('data/rankings/manifest.json' + _v)
    .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
    .then(j => {
      RANKINGS_AVAILABLE = j.sources || [];
    })
    .catch(err => {
      console.warn('[rankings] failed to load manifest', err);
      RANKINGS_AVAILABLE = [];
    });
}

function _ensureComboLoaded(analyst, format) {
  const key = _comboKey(analyst, format);
  if (RANKINGS_CACHE[key]) return Promise.resolve(RANKINGS_CACHE[key]);

  const entry = RANKINGS_AVAILABLE.find(c => c.analyst === analyst && c.format === format);
  if (!entry) {
    return Promise.reject(new Error('No combo: ' + key));
  }
  const _v = '?v=' + (window.__DATA_VERSION || Date.now());
  return fetch('data/rankings/' + entry.file + _v)
    .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
    .then(payload => { RANKINGS_CACHE[key] = payload; return payload; });
}

// ── OVERLAYS — attach ADP comparison fields only ───────────────────────────
// CSV is the SOLE source of player identity (name, rank, pos, team, age,
// exp, avgRank, tradeValue, posRank). We do NOT fall back to FP_VALUES for
// any of those — if the CSV cell is blank, the cell renders as "—" / no
// badge / no logo. Only the three ADP overlay columns (CurrentADP,
// PreviousADP, Change) come from sources outside the CSV.
function _applyOverlay(players) {
  const adpPayload = window.ADP_PAYLOAD;
  const fmtKey = STATE.format.indexOf('1qb') === 0 ? 'startup_1qb' : 'startup_sf';

  // CURRENT ADP from byMonth.ALL bucket
  const curList = (adpPayload && adpPayload.byMonth && adpPayload.byMonth.ALL && adpPayload.byMonth.ALL[fmtKey]) || [];
  const curByKey = {};
  curList.forEach(p => { if (p.name) curByKey[_normName(p.name)] = p; });

  // PREVIOUS ADP from AdpComparator's selected month
  const cmp = window.AdpComparator;
  const prevBucket = cmp ? cmp.getMonthBucket(cmp.getCurrentMonth()) : null;
  const prevList = (prevBucket && prevBucket[fmtKey]) || [];
  const prevByKey = {};
  prevList.forEach(p => { if (p.name) prevByKey[_normName(p.name)] = p; });

  return players.map(p => {
    const key = _normName(p.name);
    const curRec  = curByKey[key];
    const prevRec = prevByKey[key];
    return Object.assign({}, p, {
      currentAdp:  (curRec  && curRec.adp  != null) ? curRec.adp  : null,
      previousAdp: (prevRec && prevRec.adp != null) ? prevRec.adp : null,
    });
  });
}

// ── RENDER ─────────────────────────────────────────────────────────────────
const COLS = [
  { key: 'rank',        label: 'Rank',         num: true  },
  { key: 'name',        label: 'Player',       num: false },
  { key: 'pos',         label: 'Pos',          num: false },
  { key: 'team',        label: 'Team',         num: false },
  { key: 'age',         label: 'Age',          num: true  },
  { key: 'exp',         label: 'Exp',          num: true  },
  { key: 'avgRank',     label: 'Avg Rank',     num: true  },
  { key: 'tradeValue',  label: 'Trade Value',  num: true  },
  { key: 'posRank',     label: 'Pos Rank',     num: false },
  { key: 'currentAdp',  label: 'Current ADP',  num: true  },
  { key: 'previousAdp', label: 'Previous ADP', num: true  },   // special-cased to host calendar trigger
  { key: 'change',      label: 'Change',       num: true  },
];

function renderHeaderRow() {
  return '<tr>' + COLS.map(c => {
    if (c.key === 'previousAdp') {
      return '<th class="rk-th-compare" data-col="previousAdp">'
        + window.AdpComparator.renderTriggerHtml()
      + '</th>';
    }
    const isSorted = STATE.sort.col === c.key;
    const arrow = isSorted
      ? '<span class="sort-arrow">' + (STATE.sort.dir === 'asc' ? '▲' : '▼') + '</span>'
      : '';
    const cls = (isSorted ? 'sorted ' : '') + (c.num ? 'col-num' : '');
    return '<th class="' + cls.trim() + '" onclick="setSort(\'' + c.key + '\')" data-col="' + c.key + '">'
      + c.label + arrow + '</th>';
  }).join('') + '</tr>';
}

function _renderRow(p) {
  const posBadge = p.pos
    ? '<span class="pos-badge pos-' + p.pos.toLowerCase() + '">' + p.pos + '</span>'
    : '';
  const teamCell = (p.team && window.TeamHelpers)
    ? window.TeamHelpers.logoImg(p.team, { size: 20, coin: true })
    : _fmtCell(p.team);
  const nameCell = '<span class="rk-player-name" onclick="_openPlayer(\''
    + (p.name || '').replace(/'/g, "\\'") + '\')">' + p.name + '</span>';
  const tradeVal = (p.tradeValue != null) ? '<span class="rk-trade-value">' + Math.round(p.tradeValue) + '</span>' : '—';
  const avgRank  = (p.avgRank   != null) ? p.avgRank.toFixed(2) : '—';
  const curAdp   = (p.currentAdp  != null) ? p.currentAdp.toFixed(1)  : '<span style="color:var(--muted)">—</span>';
  const prevAdp  = (p.previousAdp != null) ? p.previousAdp.toFixed(1) : '<span style="color:var(--muted)">—</span>';
  const chip     = window.AdpComparator.changeChipHtml(p.currentAdp, p.previousAdp);

  return '<tr>'
    + '<td class="col-num"><span class="rk-rank-cell">' + (p.rank != null ? p.rank : '—') + '</span></td>'
    + '<td class="col-name">' + nameCell + '</td>'
    + '<td>' + posBadge + '</td>'
    + '<td>' + teamCell + '</td>'
    + '<td class="col-num">' + _fmtNumeric(p.age)  + '</td>'
    + '<td class="col-num">' + _fmtNumeric(p.exp)  + '</td>'
    + '<td class="col-num">' + avgRank + '</td>'
    + '<td class="col-num">' + tradeVal + '</td>'
    + '<td>' + _fmtCell(p.posRank) + '</td>'
    + '<td class="col-num">' + curAdp + '</td>'
    + '<td class="col-num">' + prevAdp + '</td>'
    + '<td class="col-change">' + chip + '</td>'
  + '</tr>';
}

function _applyFilters(players) {
  let out = players;
  if (STATE.position !== 'all') {
    out = out.filter(p => (p.pos || '').toUpperCase() === STATE.position);
  }
  if (STATE.search) {
    const q = STATE.search.toLowerCase();
    out = out.filter(p => (p.name || '').toLowerCase().includes(q));
  }
  return out;
}

function _sortPlayers(players) {
  const col = STATE.sort.col;
  const dir = STATE.sort.dir === 'asc' ? 1 : -1;
  const numericCols = ['rank','age','exp','avgRank','tradeValue','currentAdp','previousAdp'];
  const isNum = numericCols.includes(col);
  const isChange = col === 'change';

  function val(p) {
    if (isChange) {
      const c = parseFloat(p.currentAdp), pr = parseFloat(p.previousAdp);
      if (!isFinite(c) || !isFinite(pr)) return dir > 0 ? Infinity : -Infinity;
      return c - pr;
    }
    if (isNum) {
      const n = parseFloat(p[col]);
      return isFinite(n) ? n : (dir > 0 ? Infinity : -Infinity);
    }
    return (p[col] || '').toString().toLowerCase();
  }

  return [...players].sort((a, b) => {
    const av = val(a), bv = val(b);
    if (av < bv) return -1 * dir;
    if (av > bv) return  1 * dir;
    return 0;
  });
}

function renderRankings() {
  const body = document.getElementById('rankings-body');
  if (!ACTIVE_PLAYERS.length) {
    body.innerHTML = '<div class="rk-empty">No rankings loaded yet.</div>';
    return;
  }
  const enriched = _applyOverlay(ACTIVE_PLAYERS);
  const filtered = _applyFilters(enriched);
  const sorted   = _sortPlayers(filtered);

  body.innerHTML = '<div class="rk-table-wrap"><table class="rk-table">'
    + '<thead>' + renderHeaderRow() + '</thead>'
    + '<tbody>' + sorted.map(_renderRow).join('') + '</tbody>'
  + '</table></div>';

  document.getElementById('rk-stat-count').textContent =
    sorted.length + (sorted.length === enriched.length ? '' : ' of ' + enriched.length) + ' players';
}

// ── CONTROLS ───────────────────────────────────────────────────────────────
function renderAnalystTabs() {
  const wrap = document.getElementById('rk-analyst-tabs');
  const analysts = _uniqueAnalysts();

  // Hide the strip entirely when there's nothing to switch between —
  // a single-tab strip reads as broken UI. Once a 2nd analyst CSV lands,
  // the strip reappears automatically on the next page load.
  if (analysts.length <= 1) {
    wrap.innerHTML = '';
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = '';

  wrap.innerHTML = analysts.map(key => {
    const active = STATE.analyst === key;
    const cls = 'rk-tab' + (active ? ' active' : '');
    return '<button type="button" role="tab" class="' + cls
      + '" onclick="setAnalyst(\'' + key + '\')">'
      + _analystLabel(key) + '</button>';
  }).join('');
}

function renderFormatToggle() {
  const wrap = document.getElementById('rk-format-toggle');
  wrap.innerHTML = FORMATS.map(f => {
    const enabled = _comboAvailable(STATE.analyst, f.key);
    const active  = STATE.format === f.key;
    const cls = 'rk-format-btn' + (active ? ' active' : '') + (enabled ? '' : ' disabled');
    const click = enabled ? ('onclick="setFormat(\'' + f.key + '\')"') : '';
    const title = enabled ? '' : ' title="No CSV for this combo yet"';
    return '<button type="button"' + title + ' class="' + cls + '" ' + click + '>' + f.label + '</button>';
  }).join('');
}

function _updateSubtitle() {
  const sub = document.getElementById('rk-subtitle');
  if (!sub) return;
  const active = RANKINGS_AVAILABLE.find(c => c.analyst === STATE.analyst && c.format === STATE.format);
  sub.textContent = active ? active.label : 'No data for this combo yet';
}

function setAnalyst(key) {
  if (STATE.analyst === key) return;
  STATE.analyst = key;
  try { localStorage.setItem('fpts-rankings-analyst', key); } catch (e) {}

  // Re-pick format if current isn't available under this analyst
  if (!_comboAvailable(key, STATE.format)) {
    const fallback = RANKINGS_AVAILABLE.find(c => c.analyst === key);
    if (fallback) {
      STATE.format = fallback.format;
      try { localStorage.setItem('fpts-rankings-format', STATE.format); } catch (e) {}
    }
  }
  renderAnalystTabs();
  renderFormatToggle();
  _updateSubtitle();
  _loadAndRender();
}

function setFormat(key) {
  if (STATE.format === key) return;
  STATE.format = key;
  try { localStorage.setItem('fpts-rankings-format', key); } catch (e) {}
  renderFormatToggle();
  _updateSubtitle();
  _loadAndRender();
}

function setPosition(key) {
  STATE.position = key;
  try { localStorage.setItem('fpts-rankings-position', key); } catch (e) {}
  renderRankings();
}

let _searchDebounce = 0;
function setSearch(q) {
  STATE.search = q || '';
  try { localStorage.setItem('fpts-rankings-search', STATE.search); } catch (e) {}
  clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(renderRankings, 60);
}

function setSort(col) {
  if (STATE.sort.col === col) {
    STATE.sort.dir = STATE.sort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    STATE.sort.col = col;
    STATE.sort.dir = 'asc';
  }
  renderRankings();
}

function _loadAndRender() {
  if (!_comboAvailable(STATE.analyst, STATE.format)) {
    ACTIVE_PLAYERS = [];
    renderRankings();
    return;
  }
  _ensureComboLoaded(STATE.analyst, STATE.format).then(payload => {
    ACTIVE_PLAYERS = (payload && payload.players) || [];
    renderRankings();
  }).catch(err => {
    console.warn('[rankings] load failed', err);
    ACTIVE_PLAYERS = [];
    renderRankings();
  });
}

// ── PLAYER PANEL CLICK ─────────────────────────────────────────────────────
function _openPlayer(name) {
  if (window.openPanel) window.openPanel(name);
}

// ── BOOT ───────────────────────────────────────────────────────────────────
document.addEventListener('fpts:data-ready', function () {
  // Dismiss loading overlay
  const overlay = document.getElementById('_fp-loading');
  if (overlay) overlay.style.display = 'none';

  // Initialize the ADP comparator (shared with tiers). On month change,
  // re-render so PREVIOUS ADP + CHANGE columns reflect the new anchor.
  window.AdpComparator.init({
    storageKey: 'fpts-rankings-compare-month',
    onChange: function () { renderRankings(); },
  });

  // Restore saved state from localStorage
  try {
    const a = localStorage.getItem('fpts-rankings-analyst');
    const f = localStorage.getItem('fpts-rankings-format');
    const p = localStorage.getItem('fpts-rankings-position');
    const s = localStorage.getItem('fpts-rankings-search');
    if (a) STATE.analyst = a;
    if (f) STATE.format  = f;
    if (p) STATE.position = p;
    if (s) STATE.search  = s;
  } catch (e) {}

  // Reflect restored state into the UI controls
  const posSel = document.getElementById('rk-position-filter');
  if (posSel) posSel.value = STATE.position;
  const searchInput = document.getElementById('rk-search');
  if (searchInput) searchInput.value = STATE.search;

  // Load the manifest, then pick the best matching combo & render
  loadManifest().then(() => {
    // If saved combo is no longer available, fall back to the first one
    if (!_comboAvailable(STATE.analyst, STATE.format)) {
      const first = RANKINGS_AVAILABLE[0];
      if (first) {
        STATE.analyst = first.analyst;
        STATE.format  = first.format;
      }
    }
    renderAnalystTabs();
    renderFormatToggle();
    _updateSubtitle();
    _loadAndRender();
  });
});
</script>

</body>
</html>
