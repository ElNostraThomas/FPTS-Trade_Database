<!DOCTYPE html>
<!--
═══════════════════════════════════════════════════════════════════════════
  FPTS Front Office — page template (scaffold for new pages / tools)
═══════════════════════════════════════════════════════════════════════════

  ┌──────────────────────────────────────────────────────────────────────┐
  │ BRANDING + ALIGNMENT RULES — read before adding ANY new component.   │
  │ Full rules are at the top of assets/css/brand.css ("THE BRANDING     │
  │ HARD RULES") and copy-paste recipes are in CLAUDE.md ("Recipes for   │
  │ new components"). The 5 must-knows:                                  │
  │                                                                      │
  │ 1. WHITE TEXT ON EVERY BRIGHT FILL. Pills / badges / heat tints /    │
  │    .active buttons / lg-trigger / mvs-vol-* — every surface using    │
  │    a bright brand color as bg uses color: var(--white). Never        │
  │    color: #111 on a var(--pos-*-bg) or var(--red)/(--green)/(--      │
  │    yellow)/(--orange) background.                                    │
  │                                                                      │
  │ 2. NEVER opacity: ON A PARENT THAT HAS COLORED CHILDREN. CSS         │
  │    opacity compounds. Use color: rgba(255,255,255,X) on the text     │
  │    directly. opacity: is only safe on leaf elements (placeholders,   │
  │    footnotes with no children inside) and :hover/:disabled state     │
  │    transitions.                                                      │
  │                                                                      │
  │ 3. USE THE EXISTING SHARED CLASSES. Don't roll your own pill /       │
  │    badge / tab / active-button. Reuse: .pos-pill.QB|RB|WR|TE|K,      │
  │    .icon-btn.active, .tier-badge.t-*, .ml-history-tab,               │
  │    .ml-section-toggle-btn, .rk-mode-tab, .adp-tab. brand.css is      │
  │    loaded — these all resolve automatically.                         │
  │                                                                      │
  │ 4. TABLES: thead th + td both text-align:center. Override only the   │
  │    Player / Pick / Team / variable-length-text column to left via    │
  │    a .col-name class + th[data-col="name"] attribute selector.       │
  │    Padding symmetric (8px 8px, not 8px 12px 8px 0).                  │
  │                                                                      │
  │ 5. python scripts/check-colors.py MUST PRINT CLEAN before push.      │
  │    push.bat runs it automatically and aborts on drift.               │
  └──────────────────────────────────────────────────────────────────────┘

  COPY THIS FILE WHEN STARTING A NEW PAGE OR TOOL.

  Steps:
    1.  Copy `templates/page-template.html` to `<your-new-page>.html` at
        the repo root (sibling of index.html, adp-tool.html, etc.).
    2.  Edit the three TODO markers below:
          - `<title>`             — show the page name in the browser tab.
          - `window.FPTS_CURRENT_PAGE`  — short slug ('newpage', 'optimizer', etc.).
          - `<main id="page-body">` — the page's unique content + page-specific JS.
    3.  Add a new nav link entry (Database / Calculator / User Importer /
        Tiers / ADP / your new page) to every existing page's `<nav class="nav-links">`
        block AND to this template's nav block. One-time manual step until
        nav becomes a shared partial.

  WHAT YOU GET FOR FREE (no extra wiring needed in the new page):
    • Brand CSS variables, fonts, top nav, position pills, page chrome
    • Data layer — every JSON in data/ pre-fetched and exposed on window globals:
        window.FP_VALUES, window.PICK_VALUES, window.SLEEPER_IDS,
        window.ADP_PAYLOAD, window.AUCTION_PAYLOAD, window.MVS_PAYLOAD,
        window.PLAYER_ARTICLES, window.PICK_AVAILABILITY,
        window.PICK_AVAILABILITY_META
    • Slide-out player panel with all 5 tabs:
        Trades / Player Stats / Age Curve / Trade Finder / ADP Heatmap
    • MVS extras header (OTC, Baseline, Trade Volume, Contributor Rankings)
    • FantasyPoints articles banner
    • Pick-availability heatmap with "Data refreshed" stamp
    • Rookie-pick placeholder support (ROOKIE_PICK_X.YY flame thumbnails)
    • Legend drawer

  ALL data refreshes in lockstep with ADP every time sync-adp.py runs.

  Asset versioning: keep `?v=...` query strings on every shared-module
  reference. When a shared module changes, bump the token across all pages
  that use it (push.bat's sync-check warnings catch most drift).

═══════════════════════════════════════════════════════════════════════════
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     PAGE-SPECIFIC JS — runs after data-bootstrap.js fetches every JSON
     and fires 'fpts:data-ready'. Read from window.FP_VALUES, etc. here.
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
  // Theme toggle (shared across all pages).
  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    document.getElementById('theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
    document.getElementById('theme-label').textContent = next === 'dark' ? 'LIGHT' : 'DARK';
    try { localStorage.setItem('fpts-theme', next); } catch (e) {}
  }
  (function _initTheme() {
    try {
      const saved = localStorage.getItem('fpts-theme');
      if (saved === 'light') toggleTheme();
    } catch (e) {}
  })();

  // Wait for data-bootstrap.js to hydrate all globals, then render.
  document.addEventListener('fpts:data-ready', function (e) {
    // Dismiss the loading overlay.
    const overlay = document.getElementById('_fp-loading');
    if (overlay) overlay.style.display = 'none';

    // ─────── TODO: PAGE-SPECIFIC RENDERING GOES HERE ──────────────────

    // Everything is loaded:
    //   window.FP_VALUES, window.PICK_VALUES, window.SLEEPER_IDS,
    //   window.ADP_PAYLOAD, window.AUCTION_PAYLOAD, window.MVS_PAYLOAD,
    //   window.PLAYER_ARTICLES, window.PICK_AVAILABILITY,
    //   window.PICK_AVAILABILITY_META  (drives heatmap "Data refreshed" stamp)
    //
    // Example:
    //   const players = Object.keys(window.FP_VALUES).sort();
    //   document.getElementById('page-body').innerHTML += `<p>${players.length} players loaded</p>`;
    //
    // To open the slide-out player panel:
    //   window.openPanel('Bijan Robinson');
    //
    // To render the heatmap inline somewhere:
    //   window.Heatmap.render(someContainerEl, sleeperId);
    //
    // ───────────────────────────────────────────────────────────────────
  });
</script>
