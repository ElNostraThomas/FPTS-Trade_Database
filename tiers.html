  .tier-filter-select { font-family:'Mulish',sans-serif; font-size:12px; background:var(--surface2); color:var(--white); border:1px solid var(--border2); padding:6px 22px 6px 10px; cursor:pointer; appearance:none; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M0 0l5 6 5-6z' fill='%23888'/></svg>"); background-repeat:no-repeat; background-position:right 8px center; }

  /* TIER GROUP HEADER */

  .tiers-table { width: 100%; min-width: 1100px; border-collapse: collapse; font-size: 12px; }

  /* TIER BADGE */
  .tier-badge { font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:12px; padding:3px 8px; display:inline-block; min-width:36px; text-align:center; background: var(--red); color: var(--white); }
  .tier-badge.t-spp { background: #ED810C; }
  .tier-badge.t-sp  { background: #d4302f; }
  .tier-badge.t-s   { background: #d4a017; }
  .tier-badge.t-ap  { background: #e8732a; color: var(--white); }
  .tier-badge.t-a   { background: #2c8a2c; }

  .tier-badge.t-bp, .tier-badge.t-b, .tier-badge.t-bm { background: #5b9bd5; }

  .tier-badge.t-dp, .tier-badge.t-d, .tier-badge.t-dm { background: #555; }
  .tier-badge.t-ep, .tier-badge.t-e, .tier-badge.t-em { background: #444; }
  .tier-badge.t-fp, .tier-badge.t-f, .tier-badge.t-fm { background: #333; color: var(--muted); }

  /* POS BADGE */
  .pos-badge { font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic; font-size: 11px; padding: 2px 7px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; min-width: 28px; }
  .pos-qb { background: var(--pos-qb-bg); color: var(--white); }

  /* PLAYER NAME — clickable to open Database player panel */
  .tier-player-name { font-family: 'Mulish', sans-serif; font-weight: 900; font-size: 13px; color: var(--white); cursor: pointer; transition: color .15s; }

  .tier-player-name.is-pick { color: var(--muted); cursor: default; }

  /* AUCTION dollar value */
  .tier-auction { font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic; }

  /* TRENDING column */
  .tier-trending { font-size: 14px; text-align: center; }

  /* BUY/SELL/HOLD chip */
  .tier-bsh { font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic; font-size: 10px; padding: 2px 7px; text-transform: uppercase; letter-spacing: .04em; }
  .tier-bsh.buying { background: var(--green); color: var(--white); }
  .tier-bsh.checking { background: var(--green); color: var(--white); opacity: .65; }

  /* CONTENDER chip */
  .tier-contender { font-family: 'Mulish', sans-serif; font-size: 10px; font-weight: 700; padding: 2px 7px; text-transform: uppercase; letter-spacing: .04em; background: var(--surface2); color: var(--white); border: 1px solid var(--border2); }

  /* CROSS-PAGE BUTTONS */
  .fpts-xpage-btn { font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:10px; color:var(--white); background:transparent; border:1px solid var(--border2); padding:5px 10px; cursor:pointer; text-transform:uppercase; letter-spacing:.06em; text-decoration:none; display:inline-flex; align-items:center; gap:4px; transition:all .15s; white-space:nowrap; }

  /* MOBILE */
  @media (max-width: 768px) {
    .topnav { padding: 0 10px; gap: 8px; height: 48px; }
    .wordmark svg { height: 20px; }
    .nav-links { display: none !important; }
    .nav-stat { display: none !important; }
    .nav-right { gap: 8px; }
    .nav-badge { font-size: 9px; padding: 2px 6px; }
    .mobile-nav-select { display: block !important; }
    
    .page { padding: 0 8px !important; max-width: 100vw !important; }
    .page-header { flex-direction: column; align-items: flex-start; padding: 14px 0 12px; margin-bottom: 16px; }
    .page-title { font-size: 22px !important; }
    .page-subtitle { font-size: 11px; }

    .tier-controls { flex-direction: column; align-items: stretch; gap: 8px; }
    .tier-toggle-btn { padding: 8px 12px; min-height: 36px; font-size: 10px; }
    .tier-filter-select { width: 100%; min-height: 36px; font-size: 13px; }

    .tiers-table thead th { padding: 8px 6px; font-size: 9px; }
    .tiers-table td { padding: 6px; font-size: 11px; }
    .tier-group-header { font-size: 11px; padding: 6px 10px; }

    /* Bottom safe-area */
    body { padding-bottom: max(20px, env(safe-area-inset-bottom)) !important; }
  }

  /* ════════════════════════════════════════════════════════════════════════
     MOBILE PASS v11.5 — bleed prevention, tap targets, safe-area
     This block runs AFTER all earlier mobile rules and takes precedence.
     Targets the same 5 problem categories as the other 3 production pages:
     1. Bottom-tap dead zone (iOS gestures steal taps near screen bottom)
     2. Horizontal page bleed
     3. Content overflow within containers
     4. Tap target sizes
     5. iOS input-zoom prevention
     ════════════════════════════════════════════════════════════════════════ */
  @media (max-width: 768px) {

    /* ─── 1. Bottom safe-area for tap dead zone ─── */
    body {
      padding-bottom: max(20px, env(safe-area-inset-bottom)) !important;
    }
    .page {
      padding-bottom: max(24px, calc(env(safe-area-inset-bottom) + 12px)) !important;
    }

    /* ─── 2. Horizontal bleed prevention (defensive) ─── */
    html, body {
      overflow-x: hidden !important;
      max-width: 100vw !important;
      width: 100% !important;
    }
    .page,
    .tier-controls,
    .tier-group,
    .tier-group-header {
      max-width: 100% !important;
      overflow-x: hidden !important;
    }
    /* Tiers table opts INTO horizontal scroll inside its wrapper */
    .tiers-table-wrap {
      overflow-x: auto !important;
      -webkit-overflow-scrolling: touch;
      max-width: 100% !important;
    }

    /* ─── 3. Content overflow within containers ─── */
    /* Long player names truncate gracefully */
    .tier-player-name,
    .tier-group-desc {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    /* Tier group header lets long descriptions wrap if needed */
    .tier-group-header { flex-wrap: wrap; gap: 6px; }

    /* ─── 4. Tap targets — minimum 36px height for clickables ─── */
    .tier-toggle-btn,
    .tier-filter-select,
    .fpts-xpage-btn,
    .nav-link {
      min-height: 36px !important;
    }
    .tier-player-name {
      padding: 4px 0;
      display: inline-block;
    }
    /* Table rows need vertical breathing room for tap reliability */
    .tiers-table td {
      padding-top: 10px !important;
      padding-bottom: 10px !important;
    }

    /* ─── 5. Prevent iOS input-zoom on focus ─── */
    .tier-filter-select { font-size: 14px !important; }
  }

  /* Extra-narrow phones (≤480px) — additional tightening */
  @media (max-width: 480px) {
    .tier-toggle-btn { font-size: 10px !important; padding: 8px 10px !important; }
    .tier-group-header { padding: 6px 8px !important; }
    .page-title { font-size: 18px !important; }
    .tier-group-letter { padding: 2px 6px; font-size: 12px; }
  }

  /* ═══════════════════════════════════════════════════════════════════════
     PLAYER MODAL — opened when a tier-row name is clicked.
     Mirrors the pp-modal pattern from trade-calculator / my-leagues /
     adp-tool so the user gets the same modal experience as on other pages.
     SYNC-RULE: keep the 5-tab strip aligned with the other pages
     (Trades / Player Stats / Age Curve / Trade Finder / ADP Heatmap).
     ═══════════════════════════════════════════════════════════════════════ */
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300; display:none; align-items:center; justify-content:center; padding:20px; }
  .modal-backdrop.open { display:flex; }
  .modal-backdrop .modal { background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--red); max-width:1100px; width:100%; max-height:92vh; overflow-y:auto; padding:0; position:relative; }
  .pp-top-bar { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:var(--surface); border-bottom:1px solid var(--border); flex-wrap:wrap; gap:12px; }
  .pp-top-title { font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:13px; color:var(--red); text-transform:uppercase; letter-spacing:.06em; }
  .pp-top-actions { display:flex; gap:6px; flex-wrap:wrap; }
  .pp-action-btn { background:none; border:1px solid var(--border2); color:var(--white); font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:11px; padding:6px 14px; cursor:pointer; letter-spacing:.04em; transition:border-color .15s, color .15s; }
  .pp-action-btn:hover { border-color:var(--red); color:var(--red); }
  .pp-profile { display:flex; align-items:center; gap:24px; padding:24px 28px 18px; border-bottom:1px solid var(--border); }
  .pp-hs { width:96px; height:96px; border-radius:50%; overflow:hidden; box-shadow:0 0 0 2px var(--border2); flex-shrink:0; background:var(--surface2); }
  .pp-hs img { width:100%; height:100%; object-fit:cover; object-position:top; display:block; }
  .pp-hs-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:32px; color:var(--white); background:var(--surface2); }
  .pp-info { flex:1; min-width:0; }
  .pp-id { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .pos-pill { display:inline-block; padding:3px 9px; font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:11px; letter-spacing:.04em; }
  .pos-pill.QB { background:var(--pos-qb-bg); color:#111; }
  .pos-pill.RB { background:var(--pos-rb-bg); color:#111; }
  .pos-pill.WR { background:var(--pos-wr-bg); color:#111; }
  .pos-pill.TE { background:var(--pos-te-bg); color:#111; }
  .pos-pill.K  { background:var(--pos-k-bg);  color:#111; }
  .pp-team-label { font-family:'Mulish',sans-serif; font-size:13px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--white); }
  .pp-name { font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:32px; color:var(--white); text-transform:uppercase; letter-spacing:.02em; line-height:1; margin-bottom:12px; }
  .pp-stats { display:flex; flex-wrap:wrap; gap:6px 22px; font-family:'Mulish',sans-serif; }
  .pp-stat { display:flex; flex-direction:column; gap:2px; }
  .pp-stat .k { font-size:9px; opacity:1; text-transform:uppercase; letter-spacing:.07em; color:var(--white); font-weight:800; }
  .pp-stat .v { font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:14px; color:var(--white); }
  .pp-fp { text-align:right; flex-shrink:0; }
  .pp-fp .k { font-size:9px; opacity:1; text-transform:uppercase; letter-spacing:.08em; color:var(--white); font-family:'Mulish',sans-serif; margin-bottom:4px; }
  .pp-fp .v { font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:40px; color:var(--white); line-height:1; }
  .pp-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto; }
  .pp-tab { font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:12px; letter-spacing:.06em; color:var(--white); padding:10px 18px; cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-1px; text-transform:uppercase; transition:color .15s, border-color .15s; }

const TIER_ORDER = ['S++','S+','S','A+','A','A-','B+','B','B-','C+','C','C-','D+','D','D-','E+','E','E-','F+','F','F-'];

// ════════════════════════════════════════════════════════════════════════
//  STATE

let tierView = 'grouped';  // 'grouped' | 'flat'
let tierSortCol = 'tier';
let tierSortDir = 'asc';

// ════════════════════════════════════════════════════════════════════════
//  CROSS-PAGE HANDOFF (universal helpers — identical across all 4 pages)
// ════════════════════════════════════════════════════════════════════════
window._fptsWriteHandoff = function(payload, destUrl) {
  try {
    const data = Object.assign({ ts: Date.now() }, payload);
    localStorage.setItem('fpts-handoff', JSON.stringify(data));
  } catch(e) {}
  if (destUrl) window.open(destUrl, '_blank', 'noopener');
};
window._fptsReadHandoff = function() {
  try {
    const raw = localStorage.getItem('fpts-handoff');
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data.ts || (Date.now() - data.ts) > 60000) {
      localStorage.removeItem('fpts-handoff');
      return null;
    }
    localStorage.removeItem('fpts-handoff');
    return data;
  } catch(e) { return null; }
};

// Page-specific outbound helpers
function _fptsXpageTiersToDb() {
  _fptsWriteHandoff({ source: 'tiers' }, 'index.html');
}
function _fptsXpageTiersToCalc() {
  _fptsWriteHandoff({ source: 'tiers' }, 'trade-calculator.html');
}
function _fptsXpageTiersToAdp() {
  _fptsWriteHandoff({ source: 'tiers' }, 'adp-tool.html');
}

// Click a player name → open in Database
function _fptsTiersOpenPlayer(name) {
  if (!name || name.toLowerCase().includes('rookie pick')) return;
  _fptsWriteHandoff({ source: 'tiers', primaryPlayer: name }, 'index.html');
}

// ════════════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════════════
function tierBadgeClass(tier) {
  const m = { 'S++':'spp','S+':'sp','S':'s','A+':'ap','A':'a','A-':'am','B+':'bp','B':'b','B-':'bm','C+':'cp','C':'c','C-':'cm','D+':'dp','D':'d','D-':'dm','E+':'ep','E':'e','E-':'em','F+':'fp','F':'f','F-':'fm' };
  return 't-' + (m[tier] || 's');
}

function pc(p) { return 'pos-' + (p||'wr').toLowerCase(); }

function isPick(p) {
  return (p.name || '').toLowerCase().includes('rookie pick');
}

function fmtCell(v) {
  if (v === '' || v === 'N/A' || v == null) return '<span style="color:var(--muted)">—</span>';
  return v;
}

function fmtNumeric(v) {
  if (v === '' || v === 'N/A' || v == null) return '<span style="color:var(--muted)">—</span>';
  return v;
}

function bshChipHtml(val) {
  if (!val) return '';
  const v = val.toLowerCase();
  if (v.includes('buying')) return '<span class="tier-bsh buying">Buying</span>';
  if (v.includes('checking')) return '<span class="tier-bsh checking">Checking In</span>';
  if (v.includes('selling')) return '<span class="tier-bsh selling">Selling</span>';
  if (v.includes('shopping')) return '<span class="tier-bsh shopping">Shopping</span>';
  if (v.includes('hold')) return '<span class="tier-bsh hold">Temp Hold</span>';
  return '<span class="tier-bsh">' + val + '</span>';
}

function priorityChipHtml(val) {
  if (!val) return '';
  return '<span class="tier-priority">' + val + '</span>';
}

function contenderChipHtml(val) {
  if (!val) return '';
  return '<span class="tier-contender">' + val + '</span>';
}

// ════════════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════════════
function applyFilters(players) {
  const posFilter = document.getElementById('filter-position').value;
  const tierFilter = document.getElementById('filter-tier').value;
  return players.filter(p => {
    if (posFilter !== 'all') {
      if (posFilter === 'PICK') {
        if (!isPick(p)) return false;
      } else if (p.pos !== posFilter) return false;
    }
    if (tierFilter !== 'all' && p.tier !== tierFilter) return false;
    return true;
  });
}

function renderRowHtml(p) {
  const tierBadge = '<span class="tier-badge ' + tierBadgeClass(p.tier) + '">' + p.tier + '</span>';
  const posBadge = p.pos && p.pos !== 'N/A' ? '<span class="pos-badge ' + pc(p.pos) + '">' + p.pos + '</span>' : '';
  const nameHtml = isPick(p) 
    ? '<span class="tier-player-name is-pick">' + p.name + '</span>'
    : '<span class="tier-player-name" onclick="_fptsTiersOpenPlayer(\''+p.name.replace(/'/g, "\\'")+'\')">' + p.name + '</span>';
  
  return '<tr>'
    + '<td class="col-tier">' + tierBadge + '</td>'
    + '<td class="col-name">' + nameHtml + '</td>'
    + '<td class="col-num">' + fmtNumeric(p.age) + '</td>'
    + '<td>' + posBadge + '</td>'
    + '<td>' + fmtCell(p.posRank) + '</td>'
    + '<td>' + ((p.team && window.TeamHelpers) ? window.TeamHelpers.logoImg(p.team, { size: 20, coin: true }) : fmtCell(p.team)) + '</td>'
    + '<td class="col-num">' + fmtNumeric(p.adp2026) + '</td>'
    + '<td class="col-num">' + fmtNumeric(p.adp2025) + '</td>'
    + '<td class="col-num"><span class="tier-auction">' + fmtNumeric(p.auction) + '</span></td>'
    + '<td class="col-num">' + fmtNumeric(p.ppg2025) + '</td>'
    + '<td class="tier-trending">' + (p.trending || '') + '</td>'
    + '<td>' + bshChipHtml(p.buySell) + '</td>'
    + '<td>' + priorityChipHtml(p.priority) + '</td>'
    + '<td>' + contenderChipHtml(p.contender) + '</td>'
  + '</tr>';
}

function renderHeaderRow() {
  const cols = [
    {key: 'tier', label: 'Tier'},
    {key: 'name', label: 'Player'},
    {key: 'age', label: 'Age'},
    {key: 'pos', label: 'Pos'},
    {key: 'posRank', label: 'Pos Rank'},
    {key: 'team', label: 'Team'},
    {key: 'adp2026', label: '2026 ADP'},
    {key: 'adp2025', label: '2025 ADP'},
    {key: 'auction', label: 'Auction'},
    {key: 'ppg2025', label: '2025 PPG'},
    {key: 'trending', label: 'Trending'},
    {key: 'buySell', label: 'Buy/Sell'},
    {key: 'priority', label: 'Priority'},
    {key: 'contender', label: 'Contender'},
  ];
  return '<tr>' + cols.map(c => {
    const isSorted = tierSortCol === c.key && tierView === 'flat';
    const arrow = isSorted ? '<span class="sort-arrow">' + (tierSortDir === 'asc' ? '▲' : '▼') + '</span>' : '';
    return '<th class="' + (isSorted ? 'sorted' : '') + '" onclick="setSortCol(\'' + c.key + '\')" data-col="' + c.key + '">' + c.label + arrow + '</th>';
  }).join('') + '</tr>';
}

function setSortCol(col) {
  if (tierView !== 'flat') return; // sort only works in flat view
  if (tierSortCol === col) {
    tierSortDir = tierSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    tierSortCol = col;
    tierSortDir = 'asc';
  }
  renderTiers();
}

function sortPlayers(players) {
  // numeric vs string detection per col
  const numericCols = ['age', 'adp2026', 'adp2025', 'ppg2025'];
  const tierCol = tierSortCol === 'tier';
  const numeric = numericCols.includes(tierSortCol);
  
  return [...players].sort((a, b) => {
    let av, bv;
    if (tierCol) {
      av = TIER_ORDER.indexOf(a.tier);
      bv = TIER_ORDER.indexOf(b.tier);
      if (av === -1) av = 999;
      if (bv === -1) bv = 999;
    } else if (tierSortCol === 'auction') {
      av = parseFloat((a.auction || '').replace(/[^\d.]/g, '')) || 0;
      bv = parseFloat((b.auction || '').replace(/[^\d.]/g, '')) || 0;
    } else if (numeric) {
      av = parseFloat(a[tierSortCol]) || 0;
      bv = parseFloat(b[tierSortCol]) || 0;
    } else {
      av = (a[tierSortCol] || '').toString().toLowerCase();
      bv = (b[tierSortCol] || '').toString().toLowerCase();
    }
    if (av < bv) return tierSortDir === 'asc' ? -1 : 1;
    if (av > bv) return tierSortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

function renderTiers() {
  const filtered = applyFilters(TIER_PLAYERS);
  const body = document.getElementById('tiers-body');
  
  if (tierView === 'grouped') {
    // Group by tier, render in TIER_ORDER
    const groups = {};
    filtered.forEach(p => {
      if (!groups[p.tier]) groups[p.tier] = [];
      groups[p.tier].push(p);
    });
    
    let html = '';
    TIER_ORDER.forEach(t => {
      if (!groups[t] || !groups[t].length) return;
      const desc = TIER_DESCRIPTIONS[t] || '';
      html += '<div class="tier-group">'
        + '<div class="tier-group-header">'
          + '<span class="tier-group-letter">' + t + '</span>'
          + '<span class="tier-group-desc">' + desc + '</span>'
        + '</div>'
        + '<div class="tiers-table-wrap">'
          + '<table class="tiers-table">'
            + '<thead>' + renderHeaderRow() + '</thead>'
            + '<tbody>' + groups[t].map(renderRowHtml).join('') + '</tbody>'
          + '</table>'
        + '</div>'
      + '</div>';
    });
    body.innerHTML = html || '<div style="text-align:center;color:var(--muted);padding:40px">No players match the current filters.</div>';
  } else {
    // Flat sortable
    const sorted = sortPlayers(filtered);
    body.innerHTML = '<div class="tiers-table-wrap">'
      + '<table class="tiers-table">'
        + '<thead>' + renderHeaderRow() + '</thead>'
        + '<tbody>' + sorted.map(renderRowHtml).join('') + '</tbody>'
      + '</table>'
    + '</div>';
  }
  
  document.getElementById('tiers-stat-count').textContent = filtered.length + ' players · ' + Object.keys(TIER_DESCRIPTIONS).length + ' tiers';
}

function setView(v) {
  tierView = v;
  document.getElementById('view-grouped-btn').classList.toggle('active', v === 'grouped');
  document.getElementById('view-flat-btn').classList.toggle('active', v === 'flat');
  renderTiers();
}

// ════════════════════════════════════════════════════════════════════════
//  SLEEPER OVERLAY — mutate TIER_PLAYERS with live age/team/pos/ppg2025
//  pulled from data/values.json (which sync-fp.py overlays from Sleeper).
//  The Google Sheet stays the source for tier order, buy/sell, priority,
//  contender, notes — i.e. anything that's a human judgement call.
// ════════════════════════════════════════════════════════════════════════
function _normNameTiers(name) {
  if (!name) return '';
  return String(name)
    .normalize('NFKD').replace(/[̀-ͯ]/g, '')   // strip accents
    .toLowerCase()
    .replace(/\b(jr|sr|ii|iii|iv|v)\.?\b/g, '')           // drop suffixes
    .replace(/[^a-z0-9]/g, '');                            // drop punct/space
}

function applySleeperOverlay() {
  // Reads from window globals populated by assets/js/data-bootstrap.js
  // (which has already fetched values.json / adp.json / auction.json /
  // mvs.json by the time fpts:data-ready fires). The tier-specific work
  // here is overlaying that data onto TIER_PLAYERS — synchronous now.
  try {
    const values  = window.FP_VALUES       || {};
    const adp     = window.ADP_PAYLOAD;
    const auction = window.AUCTION_PAYLOAD;
    const mvs     = window.MVS_PAYLOAD;

    // ── values overlay (Sleeper-sourced attributes) ──────────────────────
    if (Object.keys(values).length) {
      const byKey = {};
      Object.entries(values).forEach(([name, rec]) => {
        byKey[_normNameTiers(name)] = rec;
      });
      TIER_PLAYERS.forEach(p => {
        const rec = byKey[_normNameTiers(p.name)];
        if (!rec) return;
        if (rec.age   != null) p.age      = String(rec.age);
        if (rec.team)          p.team     = rec.team;
        if (rec.pos)           p.pos      = rec.pos;
        if (rec.posRank)       p.posRank  = rec.posRank;
        if (rec.ppg   != null) p.ppg2025  = String(rec.ppg);
        if (rec.injury)        p.injury   = rec.injury;
      });
    }

    // ── ADP overlay (sleeper_dynasty_adp pipeline) ───────────────────────
    // All three ADP columns (adp2026, adp2025, adpPrior) come from the same
    // pipeline that drives the ADP page: data/adp.json (current year),
    // data/adp-2025.json (prior season via year-picker), and data/adp-prev.json
    // (weekly snapshot rotated by sync-adp.py). Sheet no longer carries any
    // ADP data — those columns are entirely overlay-owned.
    function _applyAdpOverlay(payload, fieldName) {
      if (!payload || !payload.byMonth) return;
      let _fmt = 'sf';
      try { const _v = localStorage.getItem('fpts-adp-format'); if (_v === '1qb' || _v === 'sf') _fmt = _v; } catch (e) {}
      const canonList = payload.byMonth?.ALL?.[_fmt === '1qb' ? 'startup_1qb' : 'startup_sf'] || [];
      const fallList  = payload.byMonth?.ALL?.[_fmt === '1qb' ? 'startup_sf'  : 'startup_1qb'] || [];
      const canonByKey = {}, fallByKey = {};
      canonList.forEach(p => { if (p.name) canonByKey[_normNameTiers(p.name)] = p; });
      fallList .forEach(p => { if (p.name) fallByKey [_normNameTiers(p.name)] = p; });
      TIER_PLAYERS.forEach(p => {
        const rec = canonByKey[_normNameTiers(p.name)] || fallByKey[_normNameTiers(p.name)];
        if (!rec) return;
        if (rec.adp != null) p[fieldName] = String(rec.adp);
      });
    }

    if (adp && adp.byMonth && window.applySeasonBadge) window.applySeasonBadge(adp.season);
    _applyAdpOverlay(adp,                      'adp2026');
    _applyAdpOverlay(window.ADP_PAYLOAD_2025,  'adp2025');
    _applyAdpOverlay(window.ADP_PAYLOAD_PREV,  'adpPrior');

    // ── auction overlay (real dynasty auction prices) ────────────────────
    // Overwrites sheet's auction column with the median price from real
    // auctions. Dynasty auctions are overwhelmingly SF (~0 1QB auctions in
    // the dataset), so try 1QB first then fall back to SF.
    if (auction && auction.byMonth) {
      const oneByKey = {}, sfByKey = {};
      (auction.byMonth?.ALL?.startup_1qb || []).forEach(p => { if (p.name) oneByKey[_normNameTiers(p.name)] = p; });
      (auction.byMonth?.ALL?.startup_sf  || []).forEach(p => { if (p.name) sfByKey [_normNameTiers(p.name)] = p; });
      TIER_PLAYERS.forEach(p => {
        const key = _normNameTiers(p.name);
        const rec = oneByKey[key] || sfByKey[key];
        if (!rec || rec.med == null) return;
        p.auction = '$' + Math.round(rec.med);
      });
    }

    // ── MVS overlay (canonical player VALUE) ─────────────────────────────
    // Wholesale-replaces the value column with MVS, honoring the user's
    // saved SF/1QB format preference. data-bootstrap.js already did its
    // own overlay onto FP_VALUES — we re-derive here directly onto
    // TIER_PLAYERS so the tier table renders without going through FP.
    if (mvs && mvs.players) {
      let _fmt = 'sf';
      try { const _v = localStorage.getItem('fpts-adp-format'); if (_v === '1qb' || _v === 'sf') _fmt = _v; } catch (e) {}
      const mvsByKey = {};
      Object.entries(mvs.players).forEach(([name, rec]) => { mvsByKey[_normNameTiers(name)] = rec; });
      TIER_PLAYERS.forEach(p => {
        const rec = mvsByKey[_normNameTiers(p.name)];
        if (!rec) { p.value = 0; return; }
        p.value    = (_fmt === '1qb') ? rec.value1qb : rec.valueSf;
        p.valueSf  = rec.valueSf;
        p.value1qb = rec.value1qb;
      });
    }
  } catch (e) {
    console.warn('[tiers] sleeper overlay failed:', e && e.message);
  }
}

// ════════════════════════════════════════════════════════════════════════
//  Sleeper-API AGE FALLBACK
// ════════════════════════════════════════════════════════════════════════
//  For tier players whose age is still missing after applySleeperOverlay()
//  (i.e. they're not in FP's data/values.json yet — typically fresh
//  rookies). Looks up sleeperId from data/mvs.json, then fetches the
//  Sleeper bulk player metadata endpoint (~5MB, cached on window for the
//  session AND in the browser's HTTP cache for subsequent visits) and
//  pulls `age` (or computes it from `birth_date` if Sleeper only carries
//  the latter for that player).
//
//  Returns true if at least one player got an age — signalling the caller
//  to re-render. Silent failures (network, etc.) return false; existing
//  empty-age cells just stay empty.
// ════════════════════════════════════════════════════════════════════════
async function applySleeperApiAgeFallback() {
  const missing = TIER_PLAYERS.filter(p => (p.age == null || p.age === '') && p.name);
  if (!missing.length) return false;

  const mvsPlayers = (window.MVS_PAYLOAD && window.MVS_PAYLOAD.players) || {};
  const mvsByKey = {};
  Object.entries(mvsPlayers).forEach(([name, rec]) => { mvsByKey[_normNameTiers(name)] = rec; });

  const targets = missing
    .map(p => ({ p, sid: mvsByKey[_normNameTiers(p.name)]?.sleeperId }))
    .filter(x => x.sid);
  if (!targets.length) return false;

  try {
    if (!window.__SLEEPER_PLAYERS_NFL) {
      const r = await fetch('https://api.sleeper.app/v1/players/nfl', { cache: 'default' });
      if (!r.ok) return false;
      window.__SLEEPER_PLAYERS_NFL = await r.json();
    }
    const cache = window.__SLEEPER_PLAYERS_NFL || {};
    let filled = 0;
    targets.forEach(({ p, sid }) => {
      const rec = cache[sid];
      if (!rec) return;
      if (rec.age != null) {
        p.age = String(rec.age);
        filled++;
      } else if (rec.birth_date) {
        const birth = new Date(rec.birth_date);
        if (!isNaN(birth)) {
          const today = new Date();
          let age = today.getFullYear() - birth.getFullYear();
          const m = today.getMonth() - birth.getMonth();
          if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
          p.age = String(age);
          filled++;
        }
      }
    });
    return filled > 0;
  } catch (e) {
    console.warn('[tiers] sleeper age fallback skipped:', e && e.message);
    return false;
  }
}

  document.getElementById('tiers-updated-stat').textContent = TIER_UPDATED;

  // First paint immediately (Google-Sheet values, raw) so the page is
  // never blank. The Sleeper overlay applies after data-bootstrap.js
  // finishes hydrating window globals — listen for 'fpts:data-ready'.
  // Then the optional Sleeper-API age fallback for players FP doesn't
  // have yet (fresh rookies) — re-render only if at least one age
  // came back.
  renderTiers();
});

// Wait for data-bootstrap.js to populate window.FP_VALUES /
// ADP_PAYLOAD / AUCTION_PAYLOAD / MVS_PAYLOAD, then run the tier-
// specific overlay onto TIER_PLAYERS and repaint.
document.addEventListener('fpts:data-ready', () => {
  applySleeperOverlay();
  renderTiers();
  applySleeperApiAgeFallback().then(filled => { if (filled) renderTiers(); });

  // Fetch the two extra ADP files the tier table needs in addition to the
  // current-year adp.json that data-bootstrap already hydrated. Both are
  // optional — failures leave the respective column empty (renders as "—").
  const _v = '?v=' + (window.__DATA_VERSION || Date.now());
  Promise.all([
    fetch('data/adp-2025.json' + _v).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch('data/adp-prev.json' + _v).then(r => r.ok ? r.json() : null).catch(() => null),
  ]).then(([adp2025, adpPrev]) => {
    if (adp2025) window.ADP_PAYLOAD_2025 = adp2025;
    if (adpPrev) window.ADP_PAYLOAD_PREV = adpPrev;
    if (adp2025 || adpPrev) {
      applySleeperOverlay();   // re-run so the two new columns land
      renderTiers();
    }
  });
});
</script>

<!-- PLAYER MODAL — opened inline when a tier-row name is clicked. -->
<div class="modal-backdrop" id="tiers-modal-backdrop" onclick="if(event.target===this)_tiersCloseModal()">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="tiers-pp-name">
    <div class="pp-top-bar">
      <div class="pp-top-title">Player Profile</div>
      <div class="pp-top-actions">
        <button class="pp-action-btn" type="button" onclick="_tiersXpageToDb()">Open in Database ↗</button>
        <button class="pp-action-btn" type="button" onclick="_tiersXpageToCalc()">Open in Calculator ↗</button>
        <button class="pp-action-btn" type="button" onclick="_tiersXpageToAdp()">Open in ADP ↗</button>
        <button class="pp-action-btn" type="button" onclick="_tiersXpageToLeagues()">Open in My Leagues ↗</button>
        <button class="pp-action-btn" type="button" onclick="_tiersCloseModal()">✕ Close</button>
      </div>
    </div>
    <div class="pp-profile">
      <div class="pp-hs" id="tiers-pp-hs"></div>
      <div class="pp-info">
        <div class="pp-id">
          <span class="pos-pill" id="tiers-pp-pos"></span>
          <span class="pp-team-label" id="tiers-pp-team"></span>
        </div>
        <div class="pp-name" id="tiers-pp-name">—</div>
        <div class="pp-stats" id="tiers-pp-stats"></div>
      </div>
      <div class="pp-fp">
        <div class="k">Fantasy Points</div>
        <div class="v" id="tiers-pp-fpv">—</div>
      </div>
    </div>
    <div id="tiers-pp-mvs-extras"></div>
    <!-- Articles section — shared player-articles.js module. -->
    <div id="tiers-pp-articles-mount"></div>
    <!-- SYNC-RULE: keep this 5-tab strip aligned with the player modals on
         the other four pages (DB / Calc / My-Leagues / ADP-tool). push.bat
         warns on drift. -->
    <div class="pp-tabs">
      <button class="pp-tab active" type="button" onclick="_tiersShowTab('trades')">Trades</button>
      <button class="pp-tab" type="button" onclick="_tiersShowTab('stats')">Player Stats</button>
      <button class="pp-tab" type="button" onclick="_tiersShowTab('curve')">Age Curve</button>
      <button class="pp-tab" type="button" onclick="_tiersShowTab('finder')">Trade Finder</button>
      <button class="pp-tab" type="button" onclick="_tiersShowTab('heatmap')">ADP Heatmap</button>
    </div>
    <div id="tiers-pp-trades-tab"></div>
    <div id="tiers-pp-stats-tab" style="display:none"></div>
    <div id="tiers-pp-curve-tab" style="display:none"></div>
    <div id="tiers-pp-finder-tab" style="display:none"></div>
    <div id="tiers-pp-heatmap-tab" style="display:none"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════
//  PLAYER MODAL — tiers-local, inline (no longer cross-page hands off to DB)
// ════════════════════════════════════════════════════════════════════════
// Data hydration is handled by assets/js/data-bootstrap.js — it fetches
// every data/*.json in lockstep and populates window.FP_VALUES /
// MVS_PAYLOAD / PICK_AVAILABILITY / PLAYER_ARTICLES / ADP_PAYLOAD /
// AUCTION_PAYLOAD / PICK_VALUES / SLEEPER_IDS, then fires 'fpts:data-ready'.
// The tier-page-specific TIER_PLAYERS overlay runs in the
// 'fpts:data-ready' listener at the bottom of this file.
window._tiersActivePlayerName = null;
window._tiersActiveSleeperId  = null;

// Replace cross-page handoff with local modal open.
window._fptsTiersOpenPlayer = function (name) {
  if (!name || name.toLowerCase().includes('rookie pick')) return;
  _tiersOpenModal(name);
};

function _tiersOpenModal(name) {
  // ── Shared-module hand-off ──────────────────────────────────────────────
  // Route through the shared player-panel so the Tiers card matches DB /
  // Calc / ADP exactly. The inline pipeline below the early-return is
  // kept dormant only in case the shared module hasn't loaded yet.
  const fp = (window.FP_VALUES && window.FP_VALUES[name]) || {};
  const sid = fp.sleeperId || null;
  window._tiersActivePlayerName = name;
  window._tiersActiveSleeperId  = sid;
  if (typeof window.openPanel === 'function' && name) {
    try { window.openPanel(name); return; } catch (e) { console.warn('[tiers] shared openPanel failed:', e); }
  }

  const backdrop = document.getElementById('tiers-modal-backdrop');
  if (!backdrop) return;
  const posRaw = String(fp.pos || (fp.posRank || '').replace(/\d+/g, '') || '').toUpperCase();
  const pos = ['QB','RB','WR','TE','K'].includes(posRaw) ? posRaw : 'WR';
  // HS
  const hsEl = document.getElementById('tiers-pp-hs');
  const initial = (name || '?').slice(0, 1).toUpperCase();
  if (sid) {
    hsEl.innerHTML = '<img src="https://sleepercdn.com/content/nfl/players/thumb/' + sid + '.jpg" alt="" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement(\'span\'),{className:\'pp-hs-fallback\',textContent:\'' + initial + '\'}))">';
  } else {
    hsEl.innerHTML = '<span class="pp-hs-fallback">' + initial + '</span>';
  }
  // Identity row
  const posPill = document.getElementById('tiers-pp-pos');
  posPill.className = 'pos-pill ' + pos;
  posPill.textContent = fp.posRank || pos;
  document.getElementById('tiers-pp-team').textContent = fp.team || '';
  document.getElementById('tiers-pp-name').textContent = name;
  // Inline stats
  const stats = [
    ['Age',          fp.age != null ? String(fp.age) : '—'],
    ['Pos Rank',     fp.posRank || '—'],
    ['Overall Rank', fp.rank ? '#' + fp.rank : '—'],
    ['PPG',          fp.ppg != null ? String(fp.ppg) : '—'],
  ];
  document.getElementById('tiers-pp-stats').innerHTML = stats.map(([k, v]) =>
    '<div class="pp-stat"><div class="k">' + k + '</div><div class="v">' + v + '</div></div>').join('');
  // FP value
  document.getElementById('tiers-pp-fpv').textContent = (fp.value != null) ? Number(fp.value).toLocaleString() : '—';
  // MVS extras — header only (no recent trades; those live in the Trades tab)
  const extrasEl = document.getElementById('tiers-pp-mvs-extras');
  if (extrasEl) extrasEl.innerHTML = window.MvsExtras ? window.MvsExtras.buildHeader(name) : '';
  // Articles — shared module
  const articlesEl = document.getElementById('tiers-pp-articles-mount');
  if (articlesEl && window.PlayerArticles) {
    articlesEl.innerHTML = '';
    window.PlayerArticles.mount(articlesEl, name);
  }
  // Reset tabs
  ['tiers-pp-trades-tab','tiers-pp-stats-tab','tiers-pp-curve-tab','tiers-pp-finder-tab','tiers-pp-heatmap-tab'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '';
  });
  _tiersShowTab('trades');
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
}

window._tiersCloseModal = function () {
  if (typeof window.closePanel === 'function') { try { window.closePanel(); } catch (e) {} }
  const backdrop = document.getElementById('tiers-modal-backdrop');
  if (backdrop) backdrop.classList.remove('open');
  document.body.style.overflow = '';
};

window._tiersShowTab = function (name) {
  const tabs = {
    trades:  'tiers-pp-trades-tab',
    stats:   'tiers-pp-stats-tab',
    curve:   'tiers-pp-curve-tab',
    finder:  'tiers-pp-finder-tab',
    heatmap: 'tiers-pp-heatmap-tab',
  };
  Object.entries(tabs).forEach(([k, id]) => {
    const el = document.getElementById(id);
    if (el) el.style.display = (k === name) ? 'block' : 'none';
  });
  document.querySelectorAll('#tiers-modal-backdrop .pp-tab').forEach(btn => {
    const m = btn.getAttribute('onclick') || '';
    btn.classList.toggle('active', m.indexOf("'" + name + "'") !== -1);
  });
  const playerName = window._tiersActivePlayerName || '';
  const sid = window._tiersActiveSleeperId || null;
  if (name === 'trades') {
    const el = document.getElementById('tiers-pp-trades-tab');
    if (el) el.innerHTML = _tiersRenderTradesTab(playerName);
  } else if (name === 'heatmap' && window.Heatmap) {
    const el = document.getElementById('tiers-pp-heatmap-tab');
    if (el) window.Heatmap.render(el, sid);
  } else if (name === 'curve') {
    const el = document.getElementById('tiers-pp-curve-tab');
    if (el) el.innerHTML = _tiersRenderAgeCurveTab(playerName);
  } else if (name === 'stats' || name === 'finder') {
    const el = document.getElementById(tabs[name]);
    if (el) el.innerHTML = _tiersRenderDbCtaTab(name, playerName);
  }
};

function _tiersRenderTradesTab(name) {
  if (!name || !window.MVS_PAYLOAD || !window.MVS_PAYLOAD.players) {
    return '<div style="padding:14px 24px;font-size:12px;color:var(--white);opacity:.7;font-family:\'Mulish\',sans-serif">No recent trades available.</div>';
  }
  const rec = window.MVS_PAYLOAD.players[name];
  const trades = (rec && rec.recentTrades) || [];
  if (!trades.length) return '<div style="padding:14px 24px;font-size:12px;color:var(--white);opacity:.7;font-family:\'Mulish\',sans-serif">No recent trades for ' + name + '.</div>';
  if (window.MvsExtras && window.MvsExtras.buildRecentTrades) {
    return '<div style="padding:14px 24px">' + window.MvsExtras.buildRecentTrades(trades, name) + '</div>';
  }
  return '';
}
function _tiersRenderAgeCurveTab(name) {
  const fp = (window.FP_VALUES && window.FP_VALUES[name]) || {};
  const age = fp.age, pos = (fp.posRank || '').replace(/\d+/g, '') || fp.pos || '';
  if (age == null) return '<div style="padding:14px 24px;font-size:12px;color:var(--white);opacity:.7;font-family:\'Mulish\',sans-serif">Age data unavailable.</div>';
  const peaks = { QB: 28, RB: 24, WR: 26, TE: 27 };
  const peak = peaks[pos] || 26;
  const delta = age - peak;
  const label = Math.abs(delta) < 1 ? 'at positional peak' : (delta < 0 ? Math.round(Math.abs(delta)) + ' yrs from peak (rising)' : Math.round(delta) + ' yrs past peak (declining)');
  return '<div style="padding:18px 24px;font-family:\'Mulish\',sans-serif;color:var(--white)">'
    + '<div style="font-family:\'Kanit\',sans-serif;font-weight:800;font-style:italic;font-size:14px;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Age Curve</div>'
    + '<div style="font-size:14px;margin-bottom:6px"><b>' + age + ' yrs old</b> · ' + pos + ' positional peak ~' + peak + '</div>'
    + '<div style="font-size:13px;opacity:.85">' + label + '</div>'
    + '<div style="margin-top:14px;padding:10px;background:var(--surface);border:1px solid var(--border);font-size:11px;opacity:.75;line-height:1.55">For full multi-year curve, open this player in the Database.</div>'
    + '</div>';
}
function _tiersRenderDbCtaTab(tabName, name) {
  const label = { stats: 'Player Stats', finder: 'Trade Finder' }[tabName] || tabName;
  return '<div style="padding:24px;text-align:center;font-family:\'Mulish\',sans-serif;color:var(--white)">'
    + '<div style="font-family:\'Kanit\',sans-serif;font-weight:800;font-style:italic;font-size:14px;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">' + label + '</div>'
    + '<div style="font-size:13px;opacity:.85;margin-bottom:14px">Full ' + label + ' is available in the Trade Database modal.</div>'
    + '<button class="pp-action-btn" type="button" onclick="_tiersXpageToDb()" style="margin:0 auto">Open in Database ↗</button>'
    + '</div>';
}

// Cross-page handoff helpers (modal action bar)
window._tiersXpageToDb      = function () { _tiersHandoff('index.html'); };
window._tiersXpageToCalc    = function () { _tiersHandoff('trade-calculator.html'); };
window._tiersXpageToAdp     = function () { _tiersHandoff('adp-tool.html'); };
window._tiersXpageToLeagues = function () { _tiersHandoff('my-leagues.html'); };
function _tiersHandoff(destUrl) {
  const name = window._tiersActivePlayerName;
  if (typeof _fptsWriteHandoff === 'function' && name) {
    _fptsWriteHandoff({ source: 'tiers', primaryPlayer: name }, destUrl);
  } else {
    window.open(destUrl, '_blank', 'noopener');
  }
}

// Escape closes modal
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') {
    const bd = document.getElementById('tiers-modal-backdrop');
    if (bd && bd.classList.contains('open')) _tiersCloseModal();
  }
});
</script>
</body>
</html>
