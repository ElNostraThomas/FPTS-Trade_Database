<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dynasty Trade Tiers | FantasyPoints</title>

<style>
  :root {
    --black: #000;
    --white: #fff;
    --red: #c8102e;
    --green: #1a8754;
    --yellow: #d4a017;
    --orange: #e8732a;
    --blue: #5b9bd5;
    --surface: #1a1a1a;
    --surface2: #252525;
    --border: #333;
    --border2: #444;
    --muted: #888;
    --pos-qb-bg: #c33;
    --pos-rb-bg: #2c8a2c;
    --pos-wr-bg: #5b9bd5;
    --pos-te-bg: #d4a017;
    --pos-pick-bg: #c33;
    --pos-k-bg: #888;
    --page-bg: var(--black);
    --nav-bg: var(--surface);
    --color-scheme: dark;
  }

  [data-theme="light"] {
    --black: #fff;
    --white: #1a1a1a;
    --red: #c8102e;
    --surface: #f5f5f5;
    --surface2: #eaeaea;
    --border: #ccc;
    --border2: #bbb;
    --muted: #666;
    --page-bg: #fff;
    --nav-bg: #f5f5f5;
    --color-scheme: light;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--page-bg); transition: background .3s; overflow-y: scroll; }
  body { color-scheme: var(--color-scheme); color: var(--white); font-family: 'Mulish', sans-serif; min-height: 100vh; background: var(--page-bg); }
  html, body { overflow-x: hidden !important; }

  @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,800&family=Mulish:wght@400;700;900&display=swap');

  /* TOPNAV (matches other pages exactly) */
  .topnav { max-width:1440px; margin:0 auto; padding:0 5px; display:flex; align-items:center; gap:40px; height:60px; }
  .wordmark { display:flex; align-items:center; flex-shrink:0; }
  .wordmark svg { height:28px; width:auto; }
  .nav-links { display:flex; gap:0; margin-left:20px; }
  .nav-link { font-family:'Mulish',sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--white); opacity:1; padding:0 16px; height:60px; display:flex; align-items:center; text-decoration:none; border-bottom:2px solid transparent; margin-bottom:-2px; transition:opacity .15s; }
  .nav-link:hover { opacity:1; }
  .nav-link.active { opacity: 1; border-bottom-color: transparent; }
  .nav-right { margin-left:auto; display:flex; align-items:center; gap:16px; }
  .nav-stat { font-family:'Mulish',sans-serif; font-size:11px; color:var(--white); opacity:1; }
  .nav-badge { background:var(--red); color:var(--white); font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:11px; padding:3px 10px; letter-spacing:.04em; }
  .mobile-nav-select { display: none; background: var(--surface2); color: var(--white); border: 1px solid var(--border2); padding: 4px 22px 4px 8px; font-family: 'Mulish', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; }

  /* PAGE */
  .page { max-width:1440px; margin:0 auto; padding:0 5px; }
  .page-header { padding:32px 0 24px; display:flex; align-items:flex-end; justify-content:space-between; border-bottom:1px solid var(--border); margin-bottom:28px; flex-wrap:wrap; gap:16px; }
  .page-title { font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:36px; color:var(--white); text-transform:uppercase; line-height:1; }
  .page-title span { color:var(--red); }
  .page-subtitle { font-family:'Mulish',sans-serif; font-size:13px; color:var(--white); opacity:1; margin-top:6px; }
  .page-stat { text-align:right; font-family:'Mulish',sans-serif; font-size:11px; color:var(--muted); }

  /* CONTROLS — view toggle + filters */
  .tier-controls { display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap; padding:12px 14px; background:var(--surface); border:1px solid var(--border); }
  .tier-control-label { font-family:'Mulish',sans-serif; font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; }
  .tier-toggle-group { display:flex; gap:0; }
  .tier-toggle-btn { background:transparent; color:var(--white); border:1px solid var(--border2); font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:11px; text-transform:uppercase; letter-spacing:.06em; padding:6px 14px; cursor:pointer; transition:all .15s; }
  .tier-toggle-btn:not(:last-child) { border-right:none; }
  .tier-toggle-btn:hover { color:var(--red); }
  .tier-toggle-btn.active { background:var(--red); border-color:var(--red); color:var(--white); }
  .tier-filter-select { font-family:'Mulish',sans-serif; font-size:12px; background:var(--surface2); color:var(--white); border:1px solid var(--border2); padding:6px 22px 6px 10px; cursor:pointer; appearance:none; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M0 0l5 6 5-6z' fill='%23888'/></svg>"); background-repeat:no-repeat; background-position:right 8px center; }

  /* TIER GROUP HEADER */
  .tier-group { margin-bottom: 24px; }
  .tier-group-header { background: var(--red); color: var(--white); padding: 8px 14px; font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:13px; text-transform:uppercase; letter-spacing:.06em; display:flex; align-items:center; gap:12px; }
  .tier-group-letter { background: var(--white); color: var(--red); padding: 2px 10px; font-size:14px; }
  .tier-group-desc { opacity:.95; font-weight: 700; }

  /* TABLE */
  .tiers-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--surface); border: 1px solid var(--border); }
  .tiers-table { width: 100%; min-width: 1100px; border-collapse: collapse; font-size: 12px; }
  .tiers-table thead th { 
    background: var(--surface2); 
    color: var(--muted); 
    font-family: 'Mulish', sans-serif; 
    font-size: 10px; 
    font-weight: 700; 
    text-transform: uppercase; 
    letter-spacing: .06em; 
    padding: 10px 8px; 
    text-align: left; 
    border-bottom: 1px solid var(--border); 
    cursor: pointer; 
    user-select: none;
    white-space: nowrap;
  }
  .tiers-table thead th:hover { color: var(--white); background: var(--surface); }
  .tiers-table thead th.sorted { color: var(--red); }
  .tiers-table thead th .sort-arrow { color: var(--red); margin-left: 4px; font-size: 9px; }
  .tiers-table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--white); white-space: nowrap; }
  .tiers-table tbody tr:hover td { background: var(--surface2); }
  .tiers-table .col-tier { width: 50px; text-align: center; }
  .tiers-table .col-name { min-width: 160px; }
  .tiers-table .col-num { text-align: right; }

  /* TIER BADGE */
  .tier-badge { font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:12px; padding:3px 8px; display:inline-block; min-width:36px; text-align:center; background: var(--red); color: var(--white); }
  .tier-badge.t-spp { background: #c8102e; }
  .tier-badge.t-sp  { background: #d4302f; }
  .tier-badge.t-s   { background: #d4a017; }
  .tier-badge.t-ap  { background: #e8732a; color: var(--white); }
  .tier-badge.t-a   { background: #2c8a2c; }
  .tier-badge.t-am  { background: #2c8a2c; opacity: .85; }
  .tier-badge.t-bp, .tier-badge.t-b, .tier-badge.t-bm { background: #5b9bd5; }
  .tier-badge.t-cp, .tier-badge.t-c, .tier-badge.t-cm { background: #6f57b6; }
  .tier-badge.t-dp, .tier-badge.t-d, .tier-badge.t-dm { background: #555; }
  .tier-badge.t-ep, .tier-badge.t-e, .tier-badge.t-em { background: #444; }
  .tier-badge.t-fp, .tier-badge.t-f, .tier-badge.t-fm { background: #333; color: var(--muted); }

  /* POS BADGE */
  .pos-badge { font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic; font-size: 11px; padding: 2px 7px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; min-width: 28px; }
  .pos-qb { background: var(--pos-qb-bg); color: var(--white); }
  .pos-rb { background: var(--pos-rb-bg); color: var(--white); }
  .pos-wr { background: var(--pos-wr-bg); color: var(--white); }
  .pos-te { background: var(--pos-te-bg); color: var(--white); }
  .pos-k  { background: var(--pos-k-bg); color: var(--white); }

  /* PLAYER NAME — clickable to open Database player panel */
  .tier-player-name { font-family: 'Mulish', sans-serif; font-weight: 900; font-size: 13px; color: var(--white); cursor: pointer; transition: color .15s; }
  .tier-player-name:hover { color: var(--red); }
  .tier-player-name.is-pick { color: var(--muted); cursor: default; }
  .tier-player-name.is-pick:hover { color: var(--muted); }

  /* AUCTION dollar value */
  .tier-auction { font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic; }

  /* TRENDING column */
  .tier-trending { font-size: 14px; text-align: center; }

  /* BUY/SELL/HOLD chip */
  .tier-bsh { font-family: 'Kanit', sans-serif; font-weight: 800; font-style: italic; font-size: 10px; padding: 2px 7px; text-transform: uppercase; letter-spacing: .04em; }
  .tier-bsh.buying { background: var(--green); color: var(--white); }
  .tier-bsh.checking { background: var(--green); color: var(--white); opacity: .65; }
  .tier-bsh.selling { background: var(--red); color: var(--white); }
  .tier-bsh.shopping { background: var(--orange); color: var(--white); }
  .tier-bsh.hold { background: var(--orange); color: var(--white); opacity: .8; }

  /* PRIORITY chip */
  .tier-priority { font-family: 'Mulish', sans-serif; font-size: 10px; font-weight: 700; padding: 2px 7px; text-transform: uppercase; letter-spacing: .04em; background: var(--surface2); color: var(--white); border: 1px solid var(--border2); }

  /* CONTENDER chip */
  .tier-contender { font-family: 'Mulish', sans-serif; font-size: 10px; font-weight: 700; padding: 2px 7px; text-transform: uppercase; letter-spacing: .04em; background: var(--surface2); color: var(--white); border: 1px solid var(--border2); }

  /* CROSS-PAGE BUTTONS */
  .fpts-xpage-btn { font-family:'Kanit',sans-serif; font-weight:800; font-style:italic; font-size:10px; color:var(--white); background:transparent; border:1px solid var(--border2); padding:5px 10px; cursor:pointer; text-transform:uppercase; letter-spacing:.06em; text-decoration:none; display:inline-flex; align-items:center; gap:4px; transition:all .15s; white-space:nowrap; }
  .fpts-xpage-btn:hover { border-color:var(--red); color:var(--red); }
  .fpts-xpage-bar { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }

  /* MOBILE */
  @media (max-width: 768px) {
    .topnav { padding: 0 10px; gap: 8px; height: 48px; }
    .wordmark svg { height: 20px; }
    .nav-links { display: none !important; }
    .nav-stat { display: none !important; }
    .nav-right { gap: 8px; }
    .nav-badge { font-size: 9px; padding: 2px 6px; }
    .mobile-nav-select { display: block !important; }
    
    .page { padding: 0 8px !important; max-width: 100vw !important; }
    .page-header { flex-direction: column; align-items: flex-start; padding: 14px 0 12px; margin-bottom: 16px; }
    .page-title { font-size: 22px !important; }
    .page-subtitle { font-size: 11px; }

    .tier-controls { flex-direction: column; align-items: stretch; gap: 8px; }
    .tier-toggle-btn { padding: 8px 12px; min-height: 36px; font-size: 10px; }
    .tier-filter-select { width: 100%; min-height: 36px; font-size: 13px; }

    .tiers-table thead th { padding: 8px 6px; font-size: 9px; }
    .tiers-table td { padding: 6px; font-size: 11px; }
    .tier-group-header { font-size: 11px; padding: 6px 10px; }

    /* Bottom safe-area */
    body { padding-bottom: max(20px, env(safe-area-inset-bottom)) !important; }
  }
  @media (max-width: 480px) {
    .page-title { font-size: 18px !important; }
    .tier-group-letter { padding: 2px 6px; font-size: 12px; }
  }
</style>
</head>

const TIER_ORDER = ['S++','S+','S','A+','A','A-','B+','B','B-','C+','C','C-','D+','D','D-','E+','E','E-','F+','F','F-'];

// ════════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════════
let tierView = 'grouped';  // 'grouped' | 'flat'
let tierSortCol = 'tier';
let tierSortDir = 'asc';

// ════════════════════════════════════════════════════════════════════════
//  CROSS-PAGE HANDOFF (universal helpers — identical across all 4 pages)
// ════════════════════════════════════════════════════════════════════════
window._fptsWriteHandoff = function(payload, destUrl) {
  try {
    const data = Object.assign({ ts: Date.now() }, payload);
    localStorage.setItem('fpts-handoff', JSON.stringify(data));
  } catch(e) {}
  if (destUrl) window.open(destUrl, '_blank', 'noopener');
};
window._fptsReadHandoff = function() {
  try {
    const raw = localStorage.getItem('fpts-handoff');
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data.ts || (Date.now() - data.ts) > 60000) {
      localStorage.removeItem('fpts-handoff');
      return null;
    }
    localStorage.removeItem('fpts-handoff');
    return data;
  } catch(e) { return null; }
};

// Page-specific outbound helpers
function _fptsXpageTiersToDb() {
  _fptsWriteHandoff({ source: 'tiers' }, 'index.html');
}
function _fptsXpageTiersToCalc() {
  _fptsWriteHandoff({ source: 'tiers' }, 'trade-calculator.html');
}

// Click a player name → open in Database
function _fptsTiersOpenPlayer(name) {
  if (!name || name.toLowerCase().includes('rookie pick')) return;
  _fptsWriteHandoff({ source: 'tiers', primaryPlayer: name }, 'index.html');
}

// ════════════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════════════
function tierBadgeClass(tier) {
  const m = { 'S++':'spp','S+':'sp','S':'s','A+':'ap','A':'a','A-':'am','B+':'bp','B':'b','B-':'bm','C+':'cp','C':'c','C-':'cm','D+':'dp','D':'d','D-':'dm','E+':'ep','E':'e','E-':'em','F+':'fp','F':'f','F-':'fm' };
  return 't-' + (m[tier] || 's');
}

function pc(p) { return 'pos-' + (p||'wr').toLowerCase(); }

function isPick(p) {
  return (p.name || '').toLowerCase().includes('rookie pick');
}

function fmtCell(v) {
  if (v === '' || v === 'N/A' || v == null) return '<span style="color:var(--muted)">—</span>';
  return v;
}

function fmtNumeric(v) {
  if (v === '' || v === 'N/A' || v == null) return '<span style="color:var(--muted)">—</span>';
  return v;
}

function bshChipHtml(val) {
  if (!val) return '';
  const v = val.toLowerCase();
  if (v.includes('buying')) return '<span class="tier-bsh buying">Buying</span>';
  if (v.includes('checking')) return '<span class="tier-bsh checking">Checking In</span>';
  if (v.includes('selling')) return '<span class="tier-bsh selling">Selling</span>';
  if (v.includes('shopping')) return '<span class="tier-bsh shopping">Shopping</span>';
  if (v.includes('hold')) return '<span class="tier-bsh hold">Temp Hold</span>';
  return '<span class="tier-bsh">' + val + '</span>';
}

function priorityChipHtml(val) {
  if (!val) return '';
  return '<span class="tier-priority">' + val + '</span>';
}

function contenderChipHtml(val) {
  if (!val) return '';
  return '<span class="tier-contender">' + val + '</span>';
}

// ════════════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════════════
function applyFilters(players) {
  const posFilter = document.getElementById('filter-position').value;
  const tierFilter = document.getElementById('filter-tier').value;
  return players.filter(p => {
    if (posFilter !== 'all') {
      if (posFilter === 'PICK') {
        if (!isPick(p)) return false;
      } else if (p.pos !== posFilter) return false;
    }
    if (tierFilter !== 'all' && p.tier !== tierFilter) return false;
    return true;
  });
}

function renderRowHtml(p) {
  const tierBadge = '<span class="tier-badge ' + tierBadgeClass(p.tier) + '">' + p.tier + '</span>';
  const posBadge = p.pos && p.pos !== 'N/A' ? '<span class="pos-badge ' + pc(p.pos) + '">' + p.pos + '</span>' : '';
  const nameHtml = isPick(p) 
    ? '<span class="tier-player-name is-pick">' + p.name + '</span>'
    : '<span class="tier-player-name" onclick="_fptsTiersOpenPlayer(\''+p.name.replace(/'/g, "\\'")+'\')">' + p.name + '</span>';
  
  return '<tr>'
    + '<td class="col-tier">' + tierBadge + '</td>'
    + '<td class="col-name">' + nameHtml + '</td>'
    + '<td class="col-num">' + fmtNumeric(p.age) + '</td>'
    + '<td>' + posBadge + '</td>'
    + '<td>' + fmtCell(p.posRank) + '</td>'
    + '<td>' + fmtCell(p.team) + '</td>'
    + '<td class="col-num">' + fmtNumeric(p.adp2026) + '</td>'
    + '<td class="col-num">' + fmtNumeric(p.adp2025) + '</td>'
    + '<td class="col-num"><span class="tier-auction">' + fmtNumeric(p.auction) + '</span></td>'
    + '<td class="col-num">' + fmtNumeric(p.ppg2025) + '</td>'
    + '<td class="tier-trending">' + (p.trending || '') + '</td>'
    + '<td>' + bshChipHtml(p.buySell) + '</td>'
    + '<td>' + priorityChipHtml(p.priority) + '</td>'
    + '<td>' + contenderChipHtml(p.contender) + '</td>'
  + '</tr>';
}

function renderHeaderRow() {
  const cols = [
    {key: 'tier', label: 'Tier'},
    {key: 'name', label: 'Player'},
    {key: 'age', label: 'Age'},
    {key: 'pos', label: 'Pos'},
    {key: 'posRank', label: 'Pos Rank'},
    {key: 'team', label: 'Team'},
    {key: 'adp2026', label: '2026 ADP'},
    {key: 'adp2025', label: '2025 ADP'},
    {key: 'auction', label: 'Auction'},
    {key: 'ppg2025', label: '2025 PPG'},
    {key: 'trending', label: 'Trending'},
    {key: 'buySell', label: 'Buy/Sell'},
    {key: 'priority', label: 'Priority'},
    {key: 'contender', label: 'Contender'},
  ];
  return '<tr>' + cols.map(c => {
    const isSorted = tierSortCol === c.key && tierView === 'flat';
    const arrow = isSorted ? '<span class="sort-arrow">' + (tierSortDir === 'asc' ? '▲' : '▼') + '</span>' : '';
    return '<th class="' + (isSorted ? 'sorted' : '') + '" onclick="setSortCol(\'' + c.key + '\')" data-col="' + c.key + '">' + c.label + arrow + '</th>';
  }).join('') + '</tr>';
}

function setSortCol(col) {
  if (tierView !== 'flat') return; // sort only works in flat view
  if (tierSortCol === col) {
    tierSortDir = tierSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    tierSortCol = col;
    tierSortDir = 'asc';
  }
  renderTiers();
}

function sortPlayers(players) {
  // numeric vs string detection per col
  const numericCols = ['age', 'adp2026', 'adp2025', 'ppg2025'];
  const tierCol = tierSortCol === 'tier';
  const numeric = numericCols.includes(tierSortCol);
  
  return [...players].sort((a, b) => {
    let av, bv;
    if (tierCol) {
      av = TIER_ORDER.indexOf(a.tier);
      bv = TIER_ORDER.indexOf(b.tier);
      if (av === -1) av = 999;
      if (bv === -1) bv = 999;
    } else if (tierSortCol === 'auction') {
      av = parseFloat((a.auction || '').replace(/[^\d.]/g, '')) || 0;
      bv = parseFloat((b.auction || '').replace(/[^\d.]/g, '')) || 0;
    } else if (numeric) {
      av = parseFloat(a[tierSortCol]) || 0;
      bv = parseFloat(b[tierSortCol]) || 0;
    } else {
      av = (a[tierSortCol] || '').toString().toLowerCase();
      bv = (b[tierSortCol] || '').toString().toLowerCase();
    }
    if (av < bv) return tierSortDir === 'asc' ? -1 : 1;
    if (av > bv) return tierSortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

function renderTiers() {
  const filtered = applyFilters(TIER_PLAYERS);
  const body = document.getElementById('tiers-body');
  
  if (tierView === 'grouped') {
    // Group by tier, render in TIER_ORDER
    const groups = {};
    filtered.forEach(p => {
      if (!groups[p.tier]) groups[p.tier] = [];
      groups[p.tier].push(p);
    });
    
    let html = '';
    TIER_ORDER.forEach(t => {
      if (!groups[t] || !groups[t].length) return;
      const desc = TIER_DESCRIPTIONS[t] || '';
      html += '<div class="tier-group">'
        + '<div class="tier-group-header">'
          + '<span class="tier-group-letter">' + t + '</span>'
          + '<span class="tier-group-desc">' + desc + '</span>'
        + '</div>'
        + '<div class="tiers-table-wrap">'
          + '<table class="tiers-table">'
            + '<thead>' + renderHeaderRow() + '</thead>'
            + '<tbody>' + groups[t].map(renderRowHtml).join('') + '</tbody>'
          + '</table>'
        + '</div>'
      + '</div>';
    });
    body.innerHTML = html || '<div style="text-align:center;color:var(--muted);padding:40px">No players match the current filters.</div>';
  } else {
    // Flat sortable
    const sorted = sortPlayers(filtered);
    body.innerHTML = '<div class="tiers-table-wrap">'
      + '<table class="tiers-table">'
        + '<thead>' + renderHeaderRow() + '</thead>'
        + '<tbody>' + sorted.map(renderRowHtml).join('') + '</tbody>'
      + '</table>'
    + '</div>';
  }
  
  document.getElementById('tiers-stat-count').textContent = filtered.length + ' players · ' + Object.keys(TIER_DESCRIPTIONS).length + ' tiers';
}

function setView(v) {
  tierView = v;
  document.getElementById('view-grouped-btn').classList.toggle('active', v === 'grouped');
  document.getElementById('view-flat-btn').classList.toggle('active', v === 'flat');
  renderTiers();
}

// ════════════════════════════════════════════════════════════════════════
//  THEME (matches other pages)
// ════════════════════════════════════════════════════════════════════════
const WORDMARK_DARK = document.getElementById('wordmark-svg').innerHTML;
const WORDMARK_LIGHT = '';

function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  if (isLight) {
    html.removeAttribute('data-theme');
    document.getElementById('theme-icon').textContent = '☀️';
    document.getElementById('theme-label').textContent = 'LIGHT';
    document.getElementById('wordmark-svg').innerHTML = WORDMARK_DARK;
    try { localStorage.setItem('fpts-theme', 'dark'); } catch(e){}
  } else {
    html.setAttribute('data-theme', 'light');
    document.getElementById('theme-icon').textContent = '🌙';
    document.getElementById('theme-label').textContent = 'DARK';
    document.getElementById('wordmark-svg').innerHTML = WORDMARK_LIGHT || WORDMARK_DARK;
    try { localStorage.setItem('fpts-theme', 'light'); } catch(e){}
  }
}

// ════════════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Restore theme
  try {
    const saved = localStorage.getItem('fpts-theme');
    if (saved === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      document.getElementById('theme-icon').textContent = '🌙';
      document.getElementById('theme-label').textContent = 'DARK';
      document.getElementById('wordmark-svg').innerHTML = WORDMARK_LIGHT || WORDMARK_DARK;
    }
  } catch(e) {}

  // Populate tier filter dropdown
  const tierSel = document.getElementById('filter-tier');
  TIER_ORDER.forEach(t => {
    const seen = TIER_PLAYERS.some(p => p.tier === t);
    if (!seen) return;
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    tierSel.appendChild(opt);
  });

  // Update timestamps
  document.getElementById('tiers-updated').textContent = TIER_UPDATED;
  document.getElementById('tiers-updated-stat').textContent = TIER_UPDATED;

  // Initial render
  renderTiers();
});
</script>
